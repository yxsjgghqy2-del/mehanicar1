<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Auftrag anlegen — 20 interaktive Designs</title>
<style>
/* ============ GRUNDGERÜST ============ */
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0F1013;color:#EDEEF0}
button{font:inherit;color:inherit;cursor:pointer;border:none;background:none}
input,select,textarea{font:inherit;outline:none;color:inherit;max-width:100%}
.num{font-variant-numeric:tabular-nums}
#stage{min-height:100vh}
/* ---- Index ---- */
.idx{max-width:480px;margin:0 auto;padding:30px 16px 70px}
.idx h1{font-size:22px;letter-spacing:-.02em;margin:0 0 6px}
.idx .s{color:#8B8E96;font-size:13px;line-height:1.6;margin-bottom:24px}
.tiles{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.tile{display:block;text-align:left;background:#191B20;border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:14px 13px;transition:transform .2s,border-color .2s;text-decoration:none;color:inherit}
.tile:hover{transform:translateY(-2px);border-color:rgba(255,255,255,.22)}
.tile .n{display:inline-block;background:#EDEEF0;color:#0F1013;font-weight:800;font-size:11px;border-radius:7px;padding:2px 7px;margin-bottom:8px}
.tile b{display:block;font-size:13px;margin-bottom:3px}
.tile span{font-size:10.5px;color:#8B8E96;line-height:1.45;display:block}
/* ---- Varianten-Rahmen ---- */
.vw{min-height:100vh;display:flex;flex-direction:column;align-items:center}
.frame{width:100%;max-width:430px;min-height:100vh;display:flex;flex-direction:column;position:relative}
.topnav{position:fixed;top:10px;left:10px;z-index:99;display:flex;gap:6px}
.topnav a{background:rgba(15,16,19,.8);color:#EDEEF0;border:1px solid rgba(255,255,255,.15);border-radius:10px;padding:7px 12px;font-size:11px;font-weight:700;text-decoration:none;backdrop-filter:blur(10px)}
/* ---- Erfolgs-Overlay ---- */
#ok{position:fixed;inset:0;background:rgba(10,10,12,.55);backdrop-filter:blur(6px);display:none;place-items:center;z-index:200}
#ok .box{background:#fff;color:#16181C;border-radius:24px;padding:30px 26px;text-align:center;max-width:300px;animation:pop .35s cubic-bezier(.3,1.4,.5,1)}
#ok .chk{width:54px;height:54px;border-radius:50%;background:#D7FF72;display:grid;place-items:center;margin:0 auto 14px;font-size:24px;color:#171A0D}
#ok b{font-size:16px;display:block;margin-bottom:4px}
#ok span{font-size:12px;color:#777}
#ok button{margin-top:16px;background:#16181C;color:#fff;border-radius:12px;padding:11px 22px;font-size:13px;font-weight:700}
@keyframes pop{from{transform:scale(.85);opacity:0}}
@media(prefers-reduced-motion:reduce){*{animation-duration:.01ms!important;transition-duration:.01ms!important}}

/* ============ GEMEINSAME FORM-BAUSTEINE (pro Variante umgefärbt) ============ */
.fl{display:block;margin-bottom:12px}
.fl small{display:block;font-size:9.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;opacity:.55;margin-bottom:5px}
.in{width:100%;border-radius:12px;padding:12px 13px;font-size:14px;border:1px solid rgba(0,0,0,.12);background:#fff;color:#16181C}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.seg2{display:flex;border-radius:14px;padding:4px;gap:4px}
.seg2 button{flex:1;padding:10px;border-radius:10px;font-size:12px;font-weight:600;opacity:.6}
.seg2 button.on{opacity:1}
.pick{display:flex;gap:8px;flex-wrap:wrap}
.pk{border-radius:12px;padding:9px 13px;font-size:12px;font-weight:600;border:1.5px solid transparent}
.go{width:100%;padding:15px;border-radius:16px;font-size:14px;font-weight:800;margin-top:6px}

/* ============ V1 WIZARD ============ */
.v1{background:radial-gradient(300px 240px at 90% 0%,rgba(190,228,80,.35),transparent 65%),radial-gradient(300px 260px at 0% 100%,rgba(120,215,255,.3),transparent 65%),#F3F5F0;color:#171A12}
.v1 .frame{padding:64px 18px 26px}
.v1 h2{font-size:22px;letter-spacing:-.02em;margin:0 0 4px}
.v1 .sub{font-size:12px;color:#78806B;margin-bottom:18px}
.v1 .prog{display:flex;gap:6px;margin-bottom:20px}
.v1 .prog i{flex:1;height:4px;border-radius:99px;background:rgba(23,26,18,.12)}
.v1 .prog i.on{background:#9BC400}
.v1 .card{background:rgba(255,255,255,.6);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.9);border-radius:22px;padding:18px 16px;box-shadow:0 14px 40px rgba(80,95,60,.12)}
.v1 .seg2{background:rgba(23,26,18,.06)}
.v1 .seg2 button.on{background:#fff;box-shadow:0 4px 12px rgba(0,0,0,.08)}
.v1 .in{background:rgba(255,255,255,.85);border-color:rgba(23,26,18,.1)}
.v1 .pk{background:rgba(255,255,255,.7);border-color:rgba(23,26,18,.1)}
.v1 .pk.on{background:#171A12;color:#D7FF72}
.v1 .nav1{display:flex;gap:10px;margin-top:18px}
.v1 .nav1 .back{flex:0 0 46%;background:rgba(255,255,255,.7);border:1px solid rgba(23,26,18,.12);border-radius:16px;font-weight:700;font-size:13px}
.v1 .go{background:#171A12;color:#D7FF72;flex:1;margin:0}
.v1 .steplbl{font-size:10px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:#7A9A00;margin-bottom:8px}

/* ============ V2 BLÖCKE ============ */
.v2b{background:#F4F4F6;color:#16181C}
.v2b .frame{padding:64px 16px 30px}
.v2b h2{font-size:21px;margin:0 0 16px}
.v2b .blk{background:#fff;border-radius:18px;padding:16px 15px;margin-bottom:12px;box-shadow:0 8px 24px rgba(22,24,28,.06)}
.v2b .bh{display:flex;align-items:center;gap:9px;margin-bottom:12px}
.v2b .bn{width:22px;height:22px;border-radius:50%;background:#0E9C8E;color:#fff;display:grid;place-items:center;font-size:11px;font-weight:800}
.v2b .bh b{font-size:13.5px}
.v2b .in{background:#F4F4F6;border-color:transparent}
.v2b .seg2{background:#F0F1F3}
.v2b .seg2 button.on{background:#fff;box-shadow:0 3px 8px rgba(0,0,0,.09)}
.v2b .pk{background:#F4F4F6}
.v2b .pk.on{background:#0E9C8E;color:#fff}
.v2b .go{background:#0E9C8E;color:#fff}

/* ============ V3 CHAT ============ */
.v3c{background:linear-gradient(180deg,#F4F6F4,#E9EFE9);color:#1B241E}
.v3c .frame{padding:64px 14px 16px}
.v3c .msgs{flex:1;display:flex;flex-direction:column;gap:10px}
.v3c .bot{max-width:88%;background:#fff;border-radius:4px 18px 18px 18px;padding:12px 14px;font-size:13px;line-height:1.5;box-shadow:0 8px 22px rgba(27,36,30,.08);animation:pop .3s}
.v3c .me{align-self:flex-end;background:#1B241E;color:#E7F5D9;border-radius:18px 4px 18px 18px;padding:10px 14px;font-size:13px;animation:pop .3s}
.v3c .chps{display:flex;gap:7px;flex-wrap:wrap}
.v3c .chps button{background:#fff;border:1.5px solid rgba(27,36,30,.15);border-radius:999px;padding:9px 14px;font-size:12px;font-weight:600}
.v3c .chps button.dark{background:#1B241E;color:#C9F26B;border-color:#1B241E}
.v3c .inrow{display:flex;gap:8px;margin-top:14px}
.v3c .in{border-radius:999px;background:#fff;border-color:transparent;box-shadow:0 8px 20px rgba(27,36,30,.08)}
.v3c .snd{flex:0 0 46px;height:46px;border-radius:50%;background:#1B241E;color:#C9F26B;font-size:16px}

/* ============ V4 BENTO ============ */
.v4b{background:radial-gradient(320px 260px at 85% 0%,rgba(124,92,255,.22),transparent 65%),radial-gradient(300px 280px at 0% 100%,rgba(46,212,199,.24),transparent 65%),#F5F3FB;color:#241C3A}
.v4b .frame{padding:64px 14px 20px}
.v4b h2{font-size:20px;margin:0 0 14px}
.v4b .bgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.v4b .bc{background:rgba(255,255,255,.66);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.95);border-radius:20px;padding:14px;min-height:96px;text-align:left;transition:all .25s;position:relative;overflow:hidden}
.v4b .bc small{font-size:9px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:#8A82A8;display:block;margin-bottom:6px}
.v4b .bc .st{font-size:13px;font-weight:700}
.v4b .bc .hint{font-size:10.5px;color:#8A82A8;margin-top:3px}
.v4b .bc.done{border-color:#7C5CFF}
.v4b .bc.done::after{content:"✓";position:absolute;top:10px;right:12px;width:20px;height:20px;border-radius:50%;background:#7C5CFF;color:#fff;font-size:11px;display:grid;place-items:center}
.v4b .bc.wide{grid-column:1/-1}
.v4b .sheet4{position:fixed;left:0;right:0;bottom:0;background:rgba(255,255,255,.92);backdrop-filter:blur(26px);border-radius:26px 26px 0 0;padding:20px 18px calc(20px + env(safe-area-inset-bottom));box-shadow:0 -18px 50px rgba(60,40,120,.18);transform:translateY(105%);transition:transform .35s cubic-bezier(.3,1,.4,1);max-width:430px;margin:0 auto;z-index:50}
.v4b .sheet4.open{transform:none}
.v4b .in{background:#F3F1F9;border-color:transparent}
.v4b .go{background:#7C5CFF;color:#fff}
.v4b .pk{background:#F3F1F9}
.v4b .pk.on{background:#7C5CFF;color:#fff}

/* ============ V5 TERMINAL ============ */
.v5t{background:#F7F8F7;color:#20261F;font-family:ui-monospace,'SF Mono',Menlo,monospace}
.v5t .frame{padding:64px 14px 20px}
.v5t .con{background:#fff;border:1px solid #D9DFD7;border-radius:12px;overflow:hidden}
.v5t .cbar{background:#20261F;color:#B9F09B;font-size:10px;padding:8px 12px;display:flex;gap:6px;align-items:center}
.v5t .cbar i{width:8px;height:8px;border-radius:50%;background:#FF5F57;display:inline-block}
.v5t .cbar i:nth-child(2){background:#FEBC2E}.v5t .cbar i:nth-child(3){background:#28C840}
.v5t .crow{display:grid;grid-template-columns:110px 1fr;border-bottom:1px solid #EEF1ED;font-size:11.5px}
.v5t .crow span{padding:11px 12px;color:#8C978A;font-size:9.5px;letter-spacing:.06em;border-right:1px solid #EEF1ED;text-transform:uppercase}
.v5t .crow input,.v5t .crow select{border:none;background:none;padding:10px 12px;font-family:inherit;font-size:12px;width:100%}
.v5t .crow input:focus{background:#F4FBEF}
.v5t .hintln{font-size:9.5px;color:#8C978A;padding:10px 4px}
.v5t .go{background:#20261F;color:#B9F09B;border-radius:10px;font-family:inherit}
.v5t .go::before{content:"> "}

/* ============ V6 KARTEN-STAPEL ============ */
.v6d{background:linear-gradient(180deg,#F2F1F6,#E5E4EC);color:#1D1B26}
.v6d .frame{padding:64px 18px 24px;justify-content:center}
.v6d .deck{position:relative;min-height:400px}
.v6d .dc{position:absolute;inset:0;background:#fff;border-radius:24px;padding:22px 20px;box-shadow:0 20px 50px rgba(29,27,38,.16);display:none;flex-direction:column;animation:pop .35s}
.v6d .dc.on{display:flex}
.v6d .dc .tag6{font-size:9.5px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:#8B87A0;margin-bottom:8px}
.v6d .dc h3{font-size:21px;margin:0 0 16px;letter-spacing:-.02em}
.v6d .ghost1,.v6d .ghost2{position:absolute;left:14px;right:14px;height:20px;background:#fff;border-radius:20px 20px 0 0;opacity:.55;top:-12px}
.v6d .ghost2{left:26px;right:26px;top:-22px;opacity:.3}
.v6d .in{background:#F2F1F6;border-color:transparent}
.v6d .pk{background:#F2F1F6}
.v6d .pk.on{background:#1D1B26;color:#D7FF72}
.v6d .dnav{display:flex;gap:10px;margin-top:auto;padding-top:16px}
.v6d .dnav .b{flex:0 0 30%;background:#F2F1F6;border-radius:14px;padding:13px;font-weight:700;font-size:12.5px}
.v6d .go{background:#1D1B26;color:#D7FF72;flex:1;margin:0}
.v6d .cnt{text-align:center;font-size:10px;color:#8B87A0;margin-top:14px;letter-spacing:.1em}

/* ============ V7 SPLIT LIVE ============ */
.v7s{background:#EEF1F4;color:#18202B}
.v7s .frame{padding:64px 14px 20px}
.v7s .prev{background:#18202B;color:#EDF1F6;border-radius:18px;padding:14px 16px;margin-bottom:14px;position:sticky;top:56px;z-index:5;box-shadow:0 14px 34px rgba(24,32,43,.3)}
.v7s .prev small{font-size:8.5px;letter-spacing:.12em;text-transform:uppercase;opacity:.5;display:block;margin-bottom:6px}
.v7s .prev .ln{display:flex;justify-content:space-between;font-size:11.5px;padding:3px 0;opacity:.9}
.v7s .prev .ln b{font-variant-numeric:tabular-nums}
.v7s .prev .ln .mis{opacity:.35;font-style:italic}
.v7s .fcard{background:#fff;border-radius:16px;padding:15px;margin-bottom:11px;box-shadow:0 6px 18px rgba(24,32,43,.06)}
.v7s .fcard b.t7{font-size:12.5px;display:block;margin-bottom:10px}
.v7s .in{background:#EEF1F4;border-color:transparent}
.v7s .go{background:#2E77E5;color:#fff}
.v7s .pk{background:#EEF1F4}
.v7s .pk.on{background:#2E77E5;color:#fff}

/* ============ V8 FORMULAR-DOKUMENT ============ */
.v8e{background:#EDEBE4;color:#1C1B17;font-family:Georgia,'Times New Roman',serif}
.v8e .frame{padding:64px 14px 30px}
.v8e .paper{background:#FDFCF8;border-radius:6px;box-shadow:0 20px 50px rgba(40,36,20,.18);padding:26px 22px;position:relative}
.v8e .paper::before{content:"AUFTRAG";position:absolute;top:18px;right:16px;font-family:-apple-system,sans-serif;font-size:9px;letter-spacing:.2em;border:2px solid #B3372C;color:#B3372C;padding:5px 9px;transform:rotate(4deg);font-weight:800;opacity:.8}
.v8e h2{font-size:24px;font-weight:600;margin:0 0 2px}
.v8e .sub8{font-style:italic;color:#8B8578;font-size:12px;margin-bottom:20px}
.v8e .fl small{font-family:-apple-system,sans-serif;color:#8B8578}
.v8e .in{background:transparent;border:none;border-bottom:1.5px solid #C9C4B4;border-radius:0;padding:8px 2px;font-family:inherit;font-size:15px}
.v8e .in:focus{border-bottom-color:#1C1B17}
.v8e .rule{border-top:2.5px solid #1C1B17;margin:18px 0 14px;position:relative}
.v8e .rule span{position:absolute;top:-9px;left:0;background:#FDFCF8;padding-right:10px;font-family:-apple-system,sans-serif;font-size:9px;letter-spacing:.14em;font-weight:800}
.v8e .go{background:#1C1B17;color:#FDFCF8;border-radius:4px;font-family:-apple-system,sans-serif;letter-spacing:.06em}
.v8e .sig{margin-top:18px;border-bottom:1.5px solid #C9C4B4;height:44px;position:relative}
.v8e .sig::after{content:"Unterschrift Kunde";position:absolute;bottom:-16px;left:0;font-family:-apple-system,sans-serif;font-size:8.5px;color:#8B8578;letter-spacing:.08em}

/* ============ V9 RADIAL ============ */
.v9r{background:linear-gradient(180deg,#EDF1F6,#DFE6EF);color:#152030}
.v9r .frame{padding:64px 18px 22px;align-items:center}
.v9r .orbit{position:relative;width:250px;height:250px;margin:6px auto 16px}
.v9r .core9{position:absolute;inset:64px;border-radius:50%;background:rgba(255,255,255,.85);backdrop-filter:blur(14px);box-shadow:0 16px 40px rgba(30,50,80,.16),inset 0 1px 0 #fff;display:grid;place-items:center;text-align:center;font-size:10px;color:#6B7686}
.v9r .core9 b{display:block;font-size:15px;color:#152030}
.v9r .sat9{position:absolute;width:76px;height:76px;border-radius:50%;background:rgba(255,255,255,.7);backdrop-filter:blur(10px);border:2px solid transparent;display:grid;place-items:center;text-align:center;font-size:9px;font-weight:700;box-shadow:0 10px 24px rgba(30,50,80,.14);transition:all .25s}
.v9r .sat9 b{display:block;font-size:15px}
.v9r .sat9.on{border-color:#00B8D9;transform:scale(1.08)}
.v9r .sat9.done{background:#00B8D9;color:#fff}
.v9r .s1{top:-4px;left:87px}.v9r .s2{bottom:16px;left:-2px}.v9r .s3{bottom:16px;right:-2px}
.v9r .panel9{width:100%;background:rgba(255,255,255,.7);backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,.95);border-radius:20px;padding:16px;flex:1}
.v9r .in{background:rgba(255,255,255,.9);border-color:rgba(21,32,48,.08)}
.v9r .go{background:#00B8D9;color:#fff}
.v9r .pk{background:rgba(255,255,255,.85)}
.v9r .pk.on{background:#00B8D9;color:#fff}

/* ============ V10 FOKUS/TYPEFORM ============ */
.v10f{background:radial-gradient(420px 380px at 50% 20%,rgba(215,255,114,.28),transparent 70%),linear-gradient(180deg,#FDFEFB,#F0F3E8);color:#171A12}
.v10f .frame{padding:64px 22px 26px;justify-content:center}
.v10f .q{font-size:26px;font-weight:750;letter-spacing:-.03em;line-height:1.2;margin-bottom:18px}
.v10f .q em{font-style:normal;color:#7A9A00}
.v10f .in{background:transparent;border:none;border-bottom:2.5px solid rgba(23,26,18,.2);border-radius:0;font-size:22px;font-weight:300;padding:8px 0}
.v10f .in:focus{border-bottom-color:#9BC400}
.v10f .pk{background:rgba(255,255,255,.8);border:1.5px solid rgba(23,26,18,.1);font-size:14px;padding:12px 18px;border-radius:14px}
.v10f .pk.on{background:#171A12;color:#D7FF72}
.v10f .fnav{display:flex;align-items:center;gap:12px;margin-top:34px}
.v10f .fnav .stp{font-size:11px;color:#8B9382;font-weight:700}
.v10f .ok10{margin-left:auto;background:#171A12;color:#D7FF72;border-radius:14px;padding:13px 26px;font-size:14px;font-weight:800}
.v10f .bk10{width:44px;height:44px;border-radius:12px;background:rgba(255,255,255,.8);border:1px solid rgba(23,26,18,.12);font-size:16px}

/* ============ V11 KANBAN-SPALTEN ============ */
.v11k{background:#F2F3F5;color:#1B1E24}
.v11k .frame{padding:64px 0 20px}
.v11k h2{font-size:19px;margin:0 16px 12px}
.v11k .cols{flex:1;display:flex;gap:10px;overflow-x:auto;padding:0 16px 10px;scroll-snap-type:x mandatory}
.v11k .col{flex:0 0 78%;scroll-snap-align:center;background:#FFFFFF;border-radius:18px;padding:15px;box-shadow:0 8px 24px rgba(27,30,36,.07);align-self:flex-start}
.v11k .colh{display:flex;gap:8px;align-items:center;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:#6E7480;margin-bottom:12px}
.v11k .colh i{width:9px;height:9px;border-radius:3px}
.v11k .in{background:#F2F3F5;border-color:transparent}
.v11k .pk{background:#F2F3F5}
.v11k .pk.on{background:#5B8DEF;color:#fff}
.v11k .go{background:#1B1E24;color:#fff;margin:0 16px;width:calc(100% - 32px)}
.v11k .hint11{font-size:10px;color:#8A8F99;margin:8px 16px 12px}

/* ============ V12 VOICE ============ */
.v12v{background:linear-gradient(180deg,#101216,#181B22);color:#EEF0F4}
.v12v .frame{padding:64px 20px 26px;align-items:center;text-align:center}
.v12v h2{font-size:19px;margin:6px 0 4px}
.v12v .s12{color:#8B90A0;font-size:12px;margin-bottom:26px}
.v12v .mic{width:120px;height:120px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#3E4450,#22262E);border:1px solid rgba(255,255,255,.14);display:grid;place-items:center;font-size:40px;position:relative;margin-bottom:20px}
.v12v .mic::before,.v12v .mic::after{content:"";position:absolute;inset:-14px;border-radius:50%;border:1px solid rgba(107,231,255,.25);animation:pulse 2.4s ease-out infinite}
.v12v .mic::after{inset:-30px;animation-delay:1.2s}
@keyframes pulse{from{transform:scale(.85);opacity:1}to{transform:scale(1.15);opacity:0}}
.v12v .trans{width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:14px;font-size:13px;line-height:1.6;color:#C6CBD6;text-align:left;min-height:74px}
.v12v .trans em{color:#6BE7FF;font-style:normal}
.v12v .found{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px;justify-content:flex-start;width:100%}
.v12v .fchip{background:rgba(107,231,255,.1);border:1px solid rgba(107,231,255,.35);color:#9FEFFF;border-radius:10px;padding:8px 12px;font-size:11px;font-weight:600;animation:pop .4s}
.v12v .fchip small{display:block;font-size:8px;opacity:.6;letter-spacing:.08em;text-transform:uppercase}

/* ---------- Index ---------- */
function renderIndex(){
 stage.innerHTML=`<div class="idx"><h1>Auftrag anlegen — 20 interaktive Designs</h1>
 <div class="s">Jede Kachel öffnet eine <b>bedienbare</b> Variante derselben Maske: Felder tippen, Schritte durchklicken, „Anlegen" drücken. Sag mir am Ende die Nummer deines Favoriten.</div>
 <div class="tiles">${DESIGNS.map((d,i)=>`<a class="tile" href="#/d/${i+1}"><span class="n">${i+1}</span><b>${d[0]}</b><span>${d[1]}</span></a>`).join('')}</div></div>`;
}

/* ---------- Router ---------- */
function route(){
 const m=location.hash.match(/#\/d\/(\d+)/);
 if(m&&V[+m[1]]){stage.innerHTML=V[+m[1]]();wire(+m[1]);window.scrollTo(0,0)}
 else{renderIndex();window.scrollTo(0,0)}
}
window.addEventListener('hashchange',route);

/* ---------- Interaktionen ---------- */
function wire(n){
 /* generisch: Segmente, Auswahl-Chips, Fertig-Buttons */
 stage.querySelectorAll('[data-seg]').forEach(sg=>sg.addEventListener('click',e=>{
  const b=e.target.closest('button');if(!b)return;
  sg.querySelectorAll('button').forEach(x=>x.classList.remove('on'));b.classList.add('on')}));
 stage.querySelectorAll('[data-single]').forEach(g=>g.addEventListener('click',e=>{
  const b=e.target.closest('.pk');if(!b)return;
  g.querySelectorAll('.pk').forEach(x=>x.classList.remove('on'));b.classList.add('on')}));
 stage.querySelectorAll('[data-done]').forEach(b=>b.addEventListener('click',okShow));

 if(n===1){/* Wizard */
  let st=1;const upd=()=>{
   stage.querySelectorAll('[data-wz]').forEach(c=>c.hidden=+c.dataset.wz!==st);
   stage.querySelectorAll('[data-p]').forEach(p=>p.classList.toggle('on',+p.dataset.p<=st));
   stage.querySelector('[data-wznum]').textContent=st;
   stage.querySelector('[data-wprev]').hidden=st===1;
   stage.querySelector('[data-wnext]').textContent=st===3?'Auftrag anlegen ✓':'Weiter'};
  stage.querySelector('[data-wnext]').addEventListener('click',()=>{if(st<3){st++;upd()}else okShow()});
  stage.querySelector('[data-wprev]').addEventListener('click',()=>{if(st>1){st--;upd()}});
 }
 if(n===3){/* Chat */
  const chat=$('#chat');
  const steps=[
   {q:'Super. <b>Welches Fahrzeug?</b> Kennzeichen reicht.',chips:['HU-SM 247 (bekannt)','Neues Fahrzeug']},
   {q:'Und <b>wann soll es fertig sein?</b>',chips:['Heute 17:00','Morgen 17:00','Datum wählen']},
   {q:'Alles klar — ich lege <b>AU-2026-0053</b> an. Passt das?',chips:['✓ Anlegen','Nochmal ändern']}];
  let idx=0;
  const say=t=>{
   chat.insertAdjacentHTML('beforeend',`<div class="me">${t}</div>`);
   const cur=chat.querySelector('[data-chat]');if(cur)cur.remove();
   if(t.startsWith('✓')){okShow();return}
   if(idx<steps.length){const s=steps[idx++];
    setTimeout(()=>{chat.insertAdjacentHTML('beforeend',`<div class="bot">${s.q}</div>
     <div class="chps" data-chat>${s.chips.map(c=>`<button data-say="${c}" ${c.startsWith('✓')?'class="dark"':''}>${c}</button>`).join('')}</div>`);
     wireChat();window.scrollTo(0,9999)},350)}};
  const wireChat=()=>stage.querySelectorAll('[data-say]').forEach(b=>{b.onclick=()=>say(b.dataset.say)});
  wireChat();
  $('#chatsnd').addEventListener('click',()=>{const v=$('#chatin').value.trim();if(v){$('#chatin').value='';say(v)}});
 }
 if(n===4){/* Bento Sheet */
  const sheet=$('#sheet4'),cont=$('#sheet4c');
  const parts={k:'<b style="font-size:15px">Kunde</b><div style="height:10px"></div>'+fldK,
   f:'<b style="font-size:15px">Fahrzeug</b><div style="height:10px"></div>'+fldF,
   t:'<b style="font-size:15px">Termin</b><div style="height:10px"></div>'+fldT};
  let cur=null;
  stage.querySelectorAll('[data-open4]').forEach(b=>b.addEventListener('click',()=>{
   cur=b;cont.innerHTML=parts[b.dataset.open4];sheet.classList.add('open');
   cont.querySelectorAll('[data-single]').forEach(g=>g.addEventListener('click',e=>{
    const p=e.target.closest('.pk');if(!p)return;
    g.querySelectorAll('.pk').forEach(x=>x.classList.remove('on'));p.classList.add('on')}))}));
  sheet.querySelector('[data-close4]').addEventListener('click',()=>{
   sheet.classList.remove('open');
   if(cur){cur.classList.add('done');
    const inp=cont.querySelector('input');const pk=cont.querySelector('.pk.on');
    const val=(pk&&pk.textContent)||(inp&&inp.value)||'';
    if(val)stage.querySelector(`[data-lbl4="${cur.dataset.open4}"]`).textContent=val}});
 }
 if(n===6){/* Deck */
  let k=1;const upd=()=>{
   stage.querySelectorAll('[data-dk]').forEach(c=>c.classList.toggle('on',+c.dataset.dk===k));
   stage.querySelector('[data-dcnt]').textContent='KARTE '+k+' VON 3'};
  stage.querySelectorAll('[data-dnext]').forEach(b=>b.addEventListener('click',()=>{if(k<3){k++;upd()}}));
  stage.querySelectorAll('[data-dprev]').forEach(b=>b.addEventListener('click',()=>{if(k>1){k--;upd()}}));
 }
 if(n===7){/* Live preview */
  stage.querySelectorAll('[data-live]').forEach(i=>i.addEventListener('input',()=>{
   const t=stage.querySelector(`[data-pv="${i.dataset.live}"]`);
   t.textContent=i.value||'— noch offen —';t.classList.toggle('mis',!i.value)}));
 }
 if(n===9){/* Radial */
  stage.querySelectorAll('[data-orb]').forEach(s=>s.addEventListener('click',()=>{
   stage.querySelectorAll('[data-orb]').forEach(x=>{if(x.classList.contains('on')){x.classList.remove('on');x.classList.add('done')}});
   s.classList.add('on');s.classList.remove('done');
   stage.querySelectorAll('[data-orbp]').forEach(p=>p.hidden=p.dataset.orbp!==s.dataset.orb)}));
 }
 if(n===10){/* Typeform */
  let q=1;const upd=()=>{
   stage.querySelectorAll('[data-fq]').forEach(c=>c.hidden=+c.dataset.fq!==q);
   stage.querySelector('[data-fnum]').textContent=q;
   stage.querySelector('[data-fprev]').hidden=q===1;
   stage.querySelector('[data-fnext]').textContent=q===3?'Anlegen ✓':'OK ↵'};
  stage.querySelector('[data-fnext]').addEventListener('click',()=>{if(q<3){q++;upd()}else okShow()});
  stage.querySelector('[data-fprev]').addEventListener('click',()=>{if(q>1){q--;upd()}});
 }
 if(n===12){/* Voice */
  const txt='Neuer Auftrag für Ali Yilmaz, BMW 320d, Kennzeichen HU-SM 247, Bremsen vorne machen, fertig morgen 17 Uhr.';
  const chips=[['Kunde','Ali Yilmaz'],['Fahrzeug','BMW 320d'],['Kennzeichen','HU-SM 247'],['Arbeit','Bremsen VA'],['Fertig','Mo. 17:00']];
  $('#mic').addEventListener('click',()=>{
   const tr=$('#trans');tr.innerHTML='';let i=0;
   const iv=setInterval(()=>{
    tr.innerHTML=txt.slice(0,i)+'<em>▌</em>';i+=3;
    if(i>txt.length){clearInterval(iv);tr.textContent=txt;
     $('#found').innerHTML=chips.map(c=>`<span class="fchip"><small>${c[0]}</small>${c[1]}</span>`).join('');
     $('#vgo').hidden=false}},30)});
 }
 if(n===13){/* Scan */
  const vals=['HU-SM 247','BMW 320d xDrive','WBA8E91070K123456','07/2019','Ali Yilmaz'];
  $('#scanbtn').addEventListener('click',()=>{
   stage.querySelectorAll('[data-sc]').forEach((b,i)=>setTimeout(()=>{b.textContent=vals[i];b.classList.add('f')},250+i*350))});
 }
 if(n===14){/* Akkordeon */
  stage.querySelectorAll('[data-ac] .ah').forEach(h=>h.addEventListener('click',()=>{
   const ac=h.parentElement;const was=ac.classList.contains('open');
   stage.querySelectorAll('[data-ac]').forEach(x=>{if(x.classList.contains('open')){x.classList.remove('open');x.classList.add('done')}});
   if(!was){ac.classList.add('open');ac.classList.remove('done')}}));
 }
 if(n===15){/* Timeline: Fokus wandert */
  stage.querySelectorAll('[data-ts]').forEach(t=>t.addEventListener('click',()=>{
   stage.querySelectorAll('[data-ts]').forEach(x=>{if(x.classList.contains('act')){x.classList.remove('act');x.classList.add('done')}});
   t.classList.add('act');t.classList.remove('done')}));
 }
 if(n===19){/* Pass-Builder */
  stage.querySelectorAll('[data-pass]').forEach(i=>i.addEventListener('input',()=>{
   const t=stage.querySelector(`[data-pp="${i.dataset.pass}"]`);
   t.textContent=i.value||(i.dataset.pass==='kz'?'HU-__ ___':i.dataset.pass==='fz'?'Fahrzeug folgt …':'—')}));
 }
}
route();
</script>
