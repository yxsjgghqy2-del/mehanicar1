<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Auftragsmaske — 20 interaktive Vollversionen</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#E9EAEC;color:#26282C}
button{font:inherit;color:inherit;cursor:pointer;border:none;background:none;text-align:left}
input,select{font:inherit;outline:none;color:inherit}
.num{font-variant-numeric:tabular-nums}
.idx{max-width:480px;margin:0 auto;padding:30px 16px 70px}
.idx h1{font-size:21px;letter-spacing:-.02em;margin:0 0 6px}
.idx .s{color:#6C7076;font-size:13px;line-height:1.6;margin-bottom:22px}
.tiles{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.tile{display:block;background:#fff;border:1px solid #DDDFE3;border-radius:10px;padding:13px;text-decoration:none;color:inherit}
.tile .n{display:inline-block;background:#26282C;color:#fff;font-weight:700;font-size:10.5px;border-radius:5px;padding:2px 7px;margin-bottom:7px}
.tile .n.dk{background:#6B5B3E}
.tile b{display:block;font-size:12.5px;margin-bottom:3px}
.tile span{font-size:10px;color:#6C7076;line-height:1.45;display:block}
.vw{min-height:100vh}
.frame{max-width:430px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;position:relative}
.topnav{position:fixed;top:10px;left:10px;z-index:99;display:flex;gap:6px}
.topnav a{background:rgba(38,40,44,.85);color:#fff;border-radius:8px;padding:7px 12px;font-size:11px;font-weight:600;text-decoration:none}
#toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%);background:#26282C;color:#fff;font-size:12px;padding:10px 16px;border-radius:10px;display:none;z-index:300}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

/* ======================= 1 · AKKORDEON PRO (hell) ======================= */
.a1{background:#F1F2F4;color:#23262B}
.a1 .frame{padding:58px 13px 96px}
.a1 .hdr1{padding:4px 4px 12px}
.a1 .hdr1 .ey{font-size:9.5px;font-weight:700;letter-spacing:.1em;color:#8A8F97;text-transform:uppercase}
.a1 .hdr1 h2{font-size:21px;margin:1px 0 8px;letter-spacing:-.02em}
.a1 .stat{display:inline-flex;align-items:center;gap:6px;border:1.5px solid #B7853B;color:#8F6524;border-radius:9px;padding:6px 11px;font-size:11.5px;font-weight:700;background:#fff}
.a1 .sec{background:#fff;border:1px solid #E1E3E6;border-radius:14px;margin-bottom:9px;overflow:hidden;box-shadow:0 1px 2px rgba(30,33,38,.05)}
.a1 .sech{width:100%;display:flex;align-items:center;gap:10px;padding:13px 14px}
.a1 .sech .t{font-size:13.5px;font-weight:700}
.a1 .sech .mini{margin-left:auto;font-size:10.5px;color:#8A8F97}
.a1 .sech .chv{width:8px;height:8px;border-right:1.8px solid #A9ADB4;border-bottom:1.8px solid #A9ADB4;transform:rotate(45deg);transition:transform .25s;flex-shrink:0}
.a1 .sec.open .chv{transform:rotate(225deg)}
.a1 .secb{display:none;padding:0 14px 13px;border-top:1px solid #EFF0F2}
.a1 .sec.open .secb{display:block}
.a1 .kv{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #F2F3F4;font-size:12.5px}
.a1 .kv span{color:#7A7E85}.a1 .kv b{font-weight:600}
.a1 .pak{border:1px solid #E7E8EA;border-radius:11px;margin-top:11px;overflow:hidden}
.a1 .pakh{width:100%;display:flex;align-items:center;gap:8px;padding:10px 12px;background:#F7F8F9;font-size:12px;font-weight:700}
.a1 .pakh .kl{font-size:9px;font-weight:800;padding:3px 7px;border-radius:6px;background:#E4EAF2;color:#3D5A80}
.a1 .pakh .sum{margin-left:auto;font-weight:700}
.a1 .pos1{display:flex;align-items:center;gap:9px;padding:9px 12px;border-top:1px solid #F0F1F3;font-size:12px}
.a1 .pos1 .bz{flex:1;min-width:0}
.a1 .pos1 .bz small{display:block;color:#8A8F97;font-size:10px;margin-top:1px}
.a1 .qty{display:flex;align-items:center;gap:2px}
.a1 .qty button{width:22px;height:22px;border-radius:6px;background:#F0F1F3;font-size:12px;text-align:center;font-weight:700}
.a1 .qty i{font-style:normal;font-size:11px;min-width:26px;text-align:center}
.a1 .pp{font-weight:700;min-width:62px;text-align:right}
.a1 .del{color:#B9BDC3;font-size:14px;padding:2px 4px}
.a1 .addp{width:100%;text-align:center;padding:10px;border-top:1px dashed #DEE0E3;color:#3D5A80;font-size:11.5px;font-weight:700}
.a1 .kbar{position:fixed;left:0;right:0;bottom:0;background:rgba(255,255,255,.96);border-top:1px solid #E1E3E6;box-shadow:0 -8px 24px rgba(30,33,38,.08)}
.a1 .kbar .in1{max-width:430px;margin:0 auto;padding:10px 16px calc(12px + env(safe-area-inset-bottom))}
.a1 .krow{display:flex;justify-content:space-between;margin-bottom:9px}
.a1 .krow div{font-size:9.5px;color:#8A8F97;font-weight:600}
.a1 .krow b{display:block;font-size:14px;color:#23262B;margin-top:1px}
.a1 .krow .gw b{color:#2F7A4D}
.a1 .kbtn{display:flex;gap:8px}
.a1 .kbtn .m{flex:1;background:#23262B;color:#fff;border-radius:10px;padding:12px;text-align:center;font-size:13px;font-weight:700}
.a1 .kbtn .s{flex:0 0 84px;background:#F0F1F3;border-radius:10px;padding:12px;text-align:center;font-size:13px;font-weight:600}

/* ======================= 2 · REGISTER-TABS ======================= */
.a2{background:#F6F6F7;color:#26282C}
.a2 .frame{padding:58px 0 30px}
.a2 .hd2{padding:0 16px 10px;display:flex;justify-content:space-between;align-items:flex-end}
.a2 .hd2 h2{font-size:20px;margin:0}
.a2 .hd2 small{color:#8A8F97;font-size:11px}
.a2 .tabs{display:flex;border-bottom:1px solid #DFE1E4;padding:0 10px;position:sticky;top:0;background:#F6F6F7;z-index:5}
.a2 .tabs button{padding:11px 12px;font-size:12.5px;font-weight:600;color:#8A8F97;border-bottom:2px solid transparent;margin-bottom:-1px}
.a2 .tabs button.on{color:#26282C;border-bottom-color:#26282C}
.a2 .body2{padding:16px}
.a2 .card2{background:#fff;border:1px solid #E5E6E8;border-radius:12px;padding:14px;margin-bottom:11px}
.a2 .card2 h4{margin:0 0 10px;font-size:12px;text-transform:uppercase;letter-spacing:.05em;color:#8A8F97}
.a2 .kv{display:flex;justify-content:space-between;padding:7px 0;font-size:12.5px;border-bottom:1px solid #F2F3F4}
.a2 .kv span{color:#7A7E85}
.a2 .pos1{display:flex;align-items:center;gap:9px;padding:10px 0;border-bottom:1px solid #F2F3F4;font-size:12.5px}
.a2 .pos1 .bz{flex:1}.a2 .pos1 .bz small{display:block;color:#8A8F97;font-size:10px}
.a2 .pp{font-weight:700}
.a2 .del{color:#C4C7CC}
.a2 .addp{color:#31649B;font-weight:700;font-size:12px;padding:10px 0}
.a2 .ksum{background:#26282C;color:#fff;border-radius:12px;padding:16px}
.a2 .ksum .r{display:flex;justify-content:space-between;padding:5px 0;font-size:12.5px;opacity:.85}
.a2 .ksum .r.big{font-size:16px;font-weight:800;opacity:1;border-top:1px solid rgba(255,255,255,.2);margin-top:8px;padding-top:11px}
.a2 .ksum .r.gw{color:#9CD1AC}
.a2 .m2b{width:100%;background:#31649B;color:#fff;border-radius:10px;padding:13px;text-align:center;font-weight:700;font-size:13.5px;margin-top:12px}

/* ======================= 3 · RECHNUNGS-BELEG ======================= */
.a3{background:#E8E6E1;color:#2A2925}
.a3 .frame{padding:58px 12px 30px}
.a3 .paper{background:#FDFCFA;box-shadow:0 14px 40px rgba(60,55,40,.18);border-radius:3px;padding:22px 18px}
.a3 .ph3{display:flex;justify-content:space-between;border-bottom:2.5px solid #2A2925;padding-bottom:10px;margin-bottom:14px}
.a3 .ph3 b{font-size:16px}
.a3 .ph3 small{font-size:9.5px;color:#8B877C;display:block;margin-top:2px}
.a3 .ph3 .re{text-align:right;font-size:10px;color:#6E6A5F}
.a3 .meta3{display:grid;grid-template-columns:1fr 1fr;gap:4px 14px;font-size:11px;margin-bottom:14px}
.a3 .meta3 span{color:#8B877C}
.a3 table{width:100%;border-collapse:collapse;font-size:11.5px}
.a3 th{text-align:left;font-size:9px;letter-spacing:.09em;text-transform:uppercase;color:#8B877C;border-bottom:1px solid #2A2925;padding:6px 4px}
.a3 td{padding:8px 4px;border-bottom:1px solid #E8E5DD;vertical-align:top}
.a3 td.r,.a3 th.r{text-align:right}
.a3 .grp3 td{font-weight:800;font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:#6E6A5F;border-bottom:1px solid #D8D4C8;padding-top:12px}
.a3 .del{color:#C0BCB0;font-size:12px}
.a3 .addln{color:#8F6524;font-weight:700;font-size:11px;padding:9px 4px}
.a3 .tots{margin-top:12px;margin-left:auto;width:70%}
.a3 .tots .r3{display:flex;justify-content:space-between;font-size:11.5px;padding:3.5px 0}
.a3 .tots .r3.b{border-top:2px solid #2A2925;font-weight:800;font-size:13.5px;margin-top:5px;padding-top:8px}
.a3 .tots .r3.g{color:#4A7A3A}
.a3 .m3b{width:100%;margin-top:16px;background:#2A2925;color:#FDFCFA;padding:13px;text-align:center;font-weight:700;font-size:13px;border-radius:3px}

/* ======================= 4 · COCKPIT DUNKEL ======================= */
.a4{background:#1F2226;color:#E3E5E8}
.a4 .frame{padding:58px 0 30px;flex-direction:row}
.a4 .rail4{width:52px;display:flex;flex-direction:column;align-items:center;gap:4px;padding-top:8px;border-right:1px solid #2E3238}
.a4 .rl{width:38px;height:38px;border-radius:10px;display:grid;place-items:center;font-size:14px;color:#7C828B}
.a4 .rl.on{background:#2E3238;color:#E3E5E8}
.a4 .body4{flex:1;padding:6px 13px 20px;min-width:0}
.a4 h2{font-size:17px;margin:0 0 2px}
.a4 .sub4{font-size:10.5px;color:#7C828B;margin-bottom:12px}
.a4 .hud{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;background:#25282D;border:1px solid #33373D;border-radius:12px;padding:11px;margin-bottom:13px}
.a4 .hud div{font-size:8.5px;color:#7C828B;text-transform:uppercase;letter-spacing:.06em}
.a4 .hud b{display:block;font-size:13px;color:#E3E5E8;margin-top:2px;font-weight:600}
.a4 .hud .gw b{color:#7FBF8E}
.a4 .sec4{border:1px solid #33373D;border-radius:12px;margin-bottom:10px;overflow:hidden}
.a4 .sech4{width:100%;display:flex;align-items:center;gap:9px;padding:11px 13px;background:#25282D;font-size:12.5px;font-weight:600}
.a4 .sech4 .mini{margin-left:auto;font-size:10px;color:#7C828B;font-weight:400}
.a4 .sech4 .chv{width:7px;height:7px;border-right:1.6px solid #7C828B;border-bottom:1.6px solid #7C828B;transform:rotate(45deg);transition:transform .2s}
.a4 .sec4.open .chv{transform:rotate(225deg)}
.a4 .secb4{display:none;padding:4px 13px 12px}
.a4 .sec4.open .secb4{display:block}
.a4 .kv{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid #2A2D32;font-size:12px}
.a4 .kv span{color:#7C828B}
.a4 .pos1{display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:1px solid #2A2D32;font-size:12px}
.a4 .pos1 .bz{flex:1}.a4 .pos1 .bz small{display:block;color:#7C828B;font-size:9.5px}
.a4 .qty button{width:20px;height:20px;border-radius:5px;background:#2E3238;text-align:center;font-size:11px}
.a4 .qty{display:flex;gap:2px;align-items:center}.a4 .qty i{font-style:normal;font-size:10.5px;min-width:24px;text-align:center}
.a4 .pp{font-weight:600;min-width:58px;text-align:right}
.a4 .del{color:#5A5F68}
.a4 .addp{width:100%;text-align:center;color:#8FB6D9;font-size:11px;font-weight:600;padding:9px;border-top:1px dashed #33373D}
.a4 .m4b{width:100%;background:#5B87B0;color:#12161A;border-radius:10px;padding:12px;text-align:center;font-weight:700;font-size:13px}

/* ======================= 5 · BENTO-KACHELN ======================= */
.a5{background:#F0F1F3;color:#25272B}
.a5 .frame{padding:58px 12px 30px}
.a5 .bg5{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.a5 .b5{background:#fff;border:1px solid #E3E4E7;border-radius:16px;padding:13px;box-shadow:0 1px 3px rgba(30,33,38,.05)}
.a5 .b5 small{font-size:9px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:#9DA1A8;display:block;margin-bottom:6px}
.a5 .b5.w{grid-column:1/-1}
.a5 .b5 .big5{font-size:22px;font-weight:300;letter-spacing:-.02em}
.a5 .b5 .sub5{font-size:10.5px;color:#7A7E85;margin-top:2px}
.a5 .pos1{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid #F0F1F3;font-size:12px}
.a5 .pos1 .bz{flex:1}.a5 .pos1 .bz small{display:inline;font-size:10px;color:#9DA1A8;font-weight:400;letter-spacing:0;text-transform:none}
.a5 .pp{font-weight:700}
.a5 .del{color:#C4C7CC}
.a5 .addp{color:#4A6FA5;font-weight:700;font-size:11.5px;padding:9px 0 2px}
.a5 .kt{display:flex;justify-content:space-between;font-size:11.5px;padding:4px 0}
.a5 .kt.b{font-weight:800;font-size:14px;border-top:1.5px solid #25272B;margin-top:6px;padding-top:8px}
.a5 .kt.g{color:#2F7A4D}
.a5 .m5b{width:100%;background:#25272B;color:#fff;border-radius:12px;padding:13px;text-align:center;font-weight:700;font-size:13px;margin-top:10px}

/* ======================= 6 · MASTER-DETAIL ======================= */
.a6{background:#EDEFF1;color:#23262B}
.a6 .frame{padding:58px 0 20px}
.a6 .hd6{padding:0 16px 10px}
.a6 h2{font-size:19px;margin:0}
.a6 .lst6{background:#fff;border-top:1px solid #E1E3E6;border-bottom:1px solid #E1E3E6;max-height:44vh;overflow-y:auto}
.a6 .li6{width:100%;display:flex;align-items:center;gap:10px;padding:11px 16px;border-bottom:1px solid #F0F1F3;font-size:12.5px}
.a6 .li6.on{background:#EBF0F6;box-shadow:inset 3px 0 0 #31649B}
.a6 .li6 .bz{flex:1}.a6 .li6 .bz small{display:block;color:#8A8F97;font-size:10px}
.a6 .pp{font-weight:700}
.a6 .det6{margin:12px 16px;background:#fff;border:1px solid #E1E3E6;border-radius:12px;padding:15px}
.a6 .det6 h4{margin:0 0 10px;font-size:13.5px}
.a6 .kv{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid #F2F3F4;font-size:12.5px}
.a6 .kv span{color:#7A7E85}
.a6 .qty{display:flex;gap:4px;align-items:center}
.a6 .qty button{width:26px;height:26px;border-radius:7px;background:#EDEFF1;text-align:center;font-weight:700}
.a6 .addp{margin:0 16px;background:#fff;border:1px dashed #B9BDC3;border-radius:10px;padding:11px;text-align:center;color:#31649B;font-weight:700;font-size:12px;width:calc(100% - 32px)}
.a6 .kfoot{margin:12px 16px 0;display:flex;justify-content:space-between;align-items:center;background:#23262B;color:#fff;border-radius:12px;padding:13px 15px}
.a6 .kfoot small{font-size:9.5px;opacity:.6;display:block}
.a6 .kfoot b{font-size:15px}
.a6 .kfoot .b6{background:#fff;color:#23262B;border-radius:9px;padding:9px 16px;font-weight:700;font-size:12.5px}

/* ======================= 7 · KLEMMBRETT ======================= */
.a7{background:#8A8578;color:#2E2C26;padding-bottom:20px}
.a7 .frame{padding:58px 14px 30px}
.a7 .board{background:#C9A56A;border-radius:14px 14px 8px 8px;padding:10px 10px 12px;box-shadow:0 18px 44px rgba(40,36,25,.35)}
.a7 .clip{width:90px;height:22px;background:linear-gradient(180deg,#9C9891,#6E6A62);border-radius:6px;margin:-20px auto 8px;box-shadow:0 3px 8px rgba(0,0,0,.3)}
.a7 .sheet7{background:#FBFAF6;border-radius:4px;padding:18px 15px}
.a7 h2{font-size:17px;margin:0 0 2px;font-weight:800}
.a7 .sub7{font-size:10.5px;color:#8B8577;margin-bottom:12px}
.a7 .box7{border:1.5px solid #2E2C26;border-radius:6px;margin-bottom:11px;overflow:hidden}
.a7 .bh7{width:100%;display:flex;justify-content:space-between;align-items:center;padding:9px 12px;background:#F1EFE8;font-size:11.5px;font-weight:800;letter-spacing:.03em;text-transform:uppercase}
.a7 .bb7{display:none;padding:10px 12px;border-top:1.5px solid #2E2C26}
.a7 .box7.open .bb7{display:block}
.a7 .kv{display:flex;justify-content:space-between;padding:6px 0;font-size:12px;border-bottom:1px dotted #D5D1C4}
.a7 .kv span{color:#8B8577}
.a7 .chk{display:flex;align-items:center;gap:9px;padding:8px 0;border-bottom:1px dotted #D5D1C4;font-size:12px}
.a7 .chk .bx{width:16px;height:16px;border:1.8px solid #2E2C26;border-radius:3px;display:grid;place-items:center;font-size:10px;flex-shrink:0}
.a7 .chk.on .bx::before{content:"✕"}
.a7 .chk .bz{flex:1}.a7 .chk .bz small{display:block;font-size:9.5px;color:#8B8577}
.a7 .pp{font-weight:800}
.a7 .addp{color:#8F6524;font-weight:800;font-size:11px;padding:8px 0;text-transform:uppercase;letter-spacing:.04em}
.a7 .tot7{display:flex;justify-content:space-between;font-size:12px;padding:4px 0}
.a7 .tot7.b{font-weight:900;font-size:14px;border-top:2px solid #2E2C26;margin-top:6px;padding-top:8px}
.a7 .m7b{width:100%;background:#2E2C26;color:#FBFAF6;padding:12px;text-align:center;font-weight:800;border-radius:5px;margin-top:12px;font-size:12.5px;letter-spacing:.04em}

/* ======================= 8 · STEPPER-PHASEN ======================= */
.a8{background:#F5F6F7;color:#24272B}
.a8 .frame{padding:58px 16px 30px}
.a8 .steps8{display:flex;align-items:center;gap:0;margin-bottom:18px}
.a8 .st8{flex:1;text-align:center;position:relative}
.a8 .st8 .dot8{width:26px;height:26px;border-radius:50%;background:#fff;border:2px solid #C9CCD1;display:grid;place-items:center;font-size:11px;font-weight:800;margin:0 auto 5px;position:relative;z-index:1}
.a8 .st8 span{font-size:9.5px;color:#8A8F97;font-weight:600}
.a8 .st8::before{content:"";position:absolute;top:13px;left:-50%;right:50%;height:2px;background:#C9CCD1}
.a8 .st8:first-child::before{display:none}
.a8 .st8.done .dot8{background:#3E6B4F;border-color:#3E6B4F;color:#fff}
.a8 .st8.on .dot8{border-color:#3E6B4F;color:#3E6B4F}
.a8 .st8.done::before,.a8 .st8.on::before{background:#3E6B4F}
.a8 .ph8{background:#fff;border:1px solid #E2E3E6;border-radius:14px;padding:16px 15px}
.a8 .ph8 h3{margin:0 0 12px;font-size:15px}
.a8 .kv{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid #F2F3F4;font-size:12.5px}
.a8 .kv span{color:#7A7E85}
.a8 .pos1{display:flex;align-items:center;gap:9px;padding:9px 0;border-bottom:1px solid #F2F3F4;font-size:12.5px}
.a8 .pos1 .bz{flex:1}.a8 .pos1 .bz small{display:block;color:#8A8F97;font-size:10px}
.a8 .pp{font-weight:700}
.a8 .addp{color:#3E6B4F;font-weight:700;font-size:12px;padding:10px 0}
.a8 .nav8{display:flex;gap:9px;margin-top:14px}
.a8 .nav8 .p{flex:0 0 40%;background:#fff;border:1px solid #C9CCD1;border-radius:10px;padding:12px;text-align:center;font-weight:600;font-size:13px}

  return`<div class="sec20 ${o?'open':''}"><button class="sh20" data-act="tgl" data-s="${id}">${t}<span class="mini">${mini}</span><span class="chv"></span></button><div class="sb20">${body}</div></div>`}};

/* =============== Router, State, Aktionen =============== */
const stage=document.getElementById('stage');
let state=null,curN=0;
const STATI=['Offen','In Arbeit','Warten auf Teile','Fertig'];
function renderIndex(){
 stage.innerHTML=`<div class="idx"><h1>Auftragsmaske — 20 Vollversionen</h1>
 <div class="s">Die <b>komplette Auftragsöffnung</b>: Kunde, Fahrzeug, Pakete mit Positionen und <b>live rechnender Kalkulation</b>. Überall echt bedienbar — auf/zuklappen, +/− an Positionen, hinzufügen, löschen, abrechnen. Gedeckte Farben, ⬛ = dunkle Variante.</div>
 <div class="tiles">${CAT.map((d,i)=>`<a class="tile" href="#/a/${i+1}"><span class="n ${d[2]?'dk':''}">${i+1}${d[2]?' ⬛':''}</span><b>${d[0]}</b><span>${d[1]}</span></a>`).join('')}</div></div>`}
function paint(){
 stage.innerHTML=`<div class="vw a${curN}"><div class="topnav"><a href="#/">← Index</a><a style="pointer-events:none;opacity:.75">${curN} · ${CAT[curN-1][0]}</a></div>
 <div class="frame">${R[curN]()}</div></div>`}
function route(){
 const m=location.hash.match(/#\/a\/(\d+)/);
 if(m&&R[+m[1]]){curN=+m[1];D=freshData();state={open:{},done:{},tab:null,phase:null,sel:null};paint()}
 else{curN=0;renderIndex()}
 window.scrollTo(0,0)}
window.addEventListener('hashchange',route);
document.addEventListener('click',e=>{
 const el=e.target.closest('[data-act]');if(!el||!curN)return;
 const a=el.dataset.act;
 const pk=el.dataset.p?D.pakete.find(x=>x.id===el.dataset.p):null;
 const p=pk&&el.dataset.x?pk.pos.find(x=>x.id===el.dataset.x):null;
 if(a==='tgl'){state.open[el.dataset.s]=state.open[el.dataset.s]===false?true:false;paint()}
 if(a==='ptgl'){pk.open=!pk.open;paint()}
 if(a==='tab'){state.tab=el.dataset.t;paint()}
 if(a==='phase'){state.phase=Math.min(3,Math.max(1,+el.dataset.ph));paint()}
 if(a==='sel'){state.sel=el.dataset.x;paint()}
 if(a==='chk'){state.done[el.dataset.x]=!state.done[el.dataset.x];paint()}
 if(a==='stat'){D.status=STATI[(STATI.indexOf(D.status)+1)%STATI.length];paint();toast('Status: '+D.status)}
 if(a==='plus'&&p){if(p.typ==='arbeit')p.aw=Math.round((p.aw+0.5)*10)/10;else p.menge++;paint()}
 if(a==='minus'&&p){if(p.typ==='arbeit')p.aw=Math.max(0.5,Math.round((p.aw-0.5)*10)/10);else p.menge=Math.max(1,p.menge-1);paint()}
 if(a==='delpos'&&p){pk.pos=pk.pos.filter(x=>x.id!==p.id);paint();toast('Position entfernt — Summen aktualisiert')}
 if(a==='addpos'&&pk){const tpl=POOL[poolIdx%POOL.length];poolIdx++;
  pk.pos.push({...tpl,id:'n'+Date.now()});paint();toast('„'+tpl.bez+'" hinzugefügt')}
 if(a==='bill'){const k=calc();toast('Demo: Rechnung über '+fmt(k.b)+' erstellt ✓')}
});
route();
</script>
</body>
</html>
