<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="mehanicar">
<meta name="theme-color" content="#F2F2F7">
<title>mehanicar</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<style>
/* ============ DESIGN TOKENS ============ */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
 --bg:#F2F2F7;--card:#FFFFFF;--ink:#16161A;--ink2:#6B6B73;--ink3:#A6A6AE;
 --line:rgba(22,22,26,.09);--line2:rgba(22,22,26,.06);
 --blue:#0E9C8E;--green:#0E8F4E;--amber:#C2710A;--red:#E0353B;--violet:#6B4DD6;
 --blue-bg:rgba(14,156,142,.1);--green-bg:rgba(14,143,78,.10);--amber-bg:rgba(194,113,10,.11);
 --red-bg:rgba(224,53,59,.09);--violet-bg:rgba(107,77,214,.10);--gray-bg:rgba(22,22,26,.06);
 --acc:#D9E97A;--acc-ink:#15180A;--acc-bg:rgba(190,209,74,.18);
 --rad:16px;--spring:cubic-bezier(.32,1.3,.5,1);--ease:cubic-bezier(.4,0,.2,1);
 --sat:env(safe-area-inset-top,0px);--sab:env(safe-area-inset-bottom,0px);
}
html{height:100%}
body{background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:var(--ink);
 letter-spacing:-.01em;height:100%;overflow:hidden;position:fixed;width:100%;overscroll-behavior:none;
 -webkit-font-smoothing:antialiased}
#app{height:100%;display:flex;flex-direction:column}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit;font-size:14px;color:var(--ink);outline:none}
::placeholder{color:var(--ink3)}
@keyframes rowIn{from{transform:translateY(14px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes fadeUp{from{transform:translateY(8px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes cardSpring{0%{transform:scale(.94) translateY(-6px);opacity:0}60%{transform:scale(1.01);opacity:1}100%{transform:scale(1)}}
@keyframes sheetUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes checkPop{0%{transform:scale(0)}70%{transform:scale(1.2)}100%{transform:scale(1)}}
@keyframes ping{0%{transform:scale(.6);opacity:.4}80%,100%{transform:scale(1.9);opacity:0}}
@keyframes lineGrow{from{transform:scaleY(0)}to{transform:scaleY(1)}}
@keyframes toastIn{0%{transform:translate(-50%,16px);opacity:0}60%{transform:translate(-50%,-3px);opacity:1}100%{transform:translate(-50%,0)}}
@keyframes tabSlideR{from{transform:translateX(48px);opacity:0}to{transform:none;opacity:1}}
@keyframes tabSlideL{from{transform:translateX(-48px);opacity:0}to{transform:none;opacity:1}}
@media (prefers-reduced-motion:reduce){*{animation-duration:.01ms!important;transition-duration:.01ms!important}}

/* ============ SHELL ============ */
.hdr{padding:calc(var(--sat) + 14px) 18px 13px;background:rgba(242,242,247,.92);backdrop-filter:blur(28px);
 -webkit-backdrop-filter:blur(28px);border-bottom:1.5px solid var(--line);z-index:30;flex-shrink:0;
 transition:background .3s,border-color .3s}
.hdr-row{display:flex;align-items:center;gap:12px;min-height:38px}
.hdr .eyebrow{font-size:10px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--ink3);
 transition:color .3s}
.hdr h1{font-size:22px;font-weight:800;letter-spacing:-.028em;line-height:1.05}
.hdr-side{margin-left:auto;display:flex;align-items:center;gap:9px}
.icon-btn{width:34px;height:34px;border-radius:10px;background:var(--card);border:1px solid var(--line);
 display:grid;place-items:center;color:var(--ink2);transition:transform .12s}
.icon-btn:active{transform:scale(.9)}
.back-btn{width:34px;height:34px;border-radius:11px;background:var(--card);border:1.5px solid var(--line);
 display:grid;place-items:center;flex-shrink:0;transition:background .3s,border-color .3s,transform .12s}
.back-btn:active{transform:scale(.88)}
.back-btn::before{content:"";width:8px;height:8px;border-left:2px solid var(--blue);border-bottom:2px solid var(--blue);
 transform:rotate(45deg);margin-left:3px;transition:border-color .3s}
.main{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:22px 18px calc(100px + env(safe-area-inset-bottom,0px))}
.nav{position:fixed;left:12px;right:12px;bottom:calc(var(--sab) + 10px);display:flex;background:rgba(255,255,255,.88);
 backdrop-filter:blur(30px) saturate(1.3);-webkit-backdrop-filter:blur(30px) saturate(1.3);border:1px solid var(--line);
 border-radius:30px;padding:7px 6px;z-index:40;box-shadow:0 14px 38px rgba(0,0,0,.18)}
.nav button{flex:1;display:flex;flex-direction:column;align-items:center;gap:1px;padding:3px 1px;
 font-size:8px;font-weight:600;color:var(--ink3);border-radius:8px;transition:color .2s;position:relative}
.nav button.on{color:var(--blue)}
.nav .nic{width:19px;height:19px;display:grid;place-items:center;position:relative}
.nav button.on .nic::after{content:"";position:absolute;bottom:-3px;left:50%;transform:translateX(-50%);
 width:14px;height:2px;background:var(--acc);border-radius:2px;opacity:.85}
.nav svg{width:19px;height:19px;stroke:currentColor;fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}
/* Tab slide animations */
.tsR #main{animation:tabSlideR .26s var(--spring) both}
.tsL #main{animation:tabSlideL .26s var(--spring) both}

/* ============ PRIMITIVES ============ */
.card{background:var(--card);border-radius:var(--rad);border:1px solid var(--line);margin-bottom:12px;overflow:hidden;
 box-shadow:0 1px 4px rgba(0,0,0,.04)}
.stag>.card,.stag>.sw{animation:rowIn .38s var(--spring) both}
.stag>*:nth-child(1){animation-delay:.03s}.stag>*:nth-child(2){animation-delay:.07s}
.stag>*:nth-child(3){animation-delay:.10s}.stag>*:nth-child(4){animation-delay:.13s}
.stag>*:nth-child(5){animation-delay:.16s}.stag>*:nth-child(6){animation-delay:.19s}
.stag>*:nth-child(7){animation-delay:.22s}.stag>*:nth-child(8){animation-delay:.25s}
.tag{font-size:10px;font-weight:650;border-radius:6px;padding:3px 8px;white-space:nowrap;display:inline-block}
.t-blue{background:var(--blue-bg);color:var(--blue)}.t-green{background:var(--green-bg);color:var(--green)}
.t-amber{background:var(--amber-bg);color:var(--amber)}.t-red{background:var(--red-bg);color:var(--red)}
.t-violet{background:var(--violet-bg);color:var(--violet)}.t-gray{background:var(--gray-bg);color:var(--ink2)}
.kv{display:flex;justify-content:space-between;gap:12px;padding:10px 0;border-bottom:1px solid var(--line2);font-size:12.5px;align-items:center}
.kv:last-child{border-bottom:none}
.kv .k{color:var(--ink3);flex-shrink:0}.kv .v{font-weight:550;text-align:right;word-break:break-word}
.lbl{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--ink3);margin:17px 0 9px}
.lbl:first-child{margin-top:2px}
.num{font-variant-numeric:tabular-nums}
.chev{width:7px;height:7px;border-right:1.5px solid var(--ink3);border-bottom:1.5px solid var(--ink3);
 transform:rotate(45deg);transition:transform .3s var(--spring);flex-shrink:0;margin-top:-3px}
.open>.sec-h .chev,.open>.pak-h .chev{transform:rotate(-135deg);margin-top:2px}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
/* Block-für-Block Auftragserstellung */
.stepblock{border:1.5px solid var(--line);border-radius:14px;padding:13px 13px 4px;margin-bottom:14px;background:var(--card)}
.step-h{display:flex;align-items:center;gap:9px;margin-bottom:11px}
.step-n{width:22px;height:22px;border-radius:50%;background:var(--acc);color:var(--acc-ink);font-size:11.5px;font-weight:800;display:grid;place-items:center;flex-shrink:0}
.step-t{font-size:13px;font-weight:750;letter-spacing:-.01em}
/* Übergang Auftragserstellung → Auftragsmaske: Inhalte rutschen nach oben */
@keyframes riseIn{from{transform:translateY(42px);opacity:.3}to{transform:none;opacity:1}}
.tsUp #main{animation:riseIn .38s var(--spring) both}
/* Header schrumpft beim Scrollen */
.hdr{transition:background .3s,border-color .3s,padding .28s var(--ease)}
.hdr .eyebrow,.hdr h1{transition:font-size .28s var(--ease),margin .28s var(--ease),opacity .25s}
.hdr .hdr-bar-wrap{overflow:hidden;max-height:64px;transition:max-height .3s var(--ease),opacity .25s}
.hdr.hmin{padding-top:calc(var(--sat) + 7px);padding-bottom:8px}
.hdr.hmin .eyebrow{font-size:0;opacity:0;margin:0}
.hdr.hmin h1{font-size:15.5px}
.hdr.hmin .hdr-bar-wrap{max-height:0;opacity:0}
/* Positions-Nummern */
.pos-nr{font-size:9px;font-weight:700;color:var(--ink3);background:var(--gray-bg);border-radius:5px;padding:1.5px 5px;margin-right:5px;vertical-align:1px;white-space:nowrap}
.pak-nr{font-size:10px;font-weight:800;color:var(--ink3);margin-right:1px;flex-shrink:0}
/* Kommunikation & Auftragshistorie: kompakte System-Zeilen */
.te-sys{display:flex;align-items:baseline;gap:8px;padding:6.5px 2px;border-bottom:1px solid var(--line2);cursor:pointer;font-size:11.5px;line-height:1.45}
.te-sys:last-child{border-bottom:none}
.te-sys .dt{color:var(--ink3);font-size:10px;flex-shrink:0;white-space:nowrap;font-variant-numeric:tabular-nums}
.te-sys .tx{color:var(--ink2);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.te-sys.x .tx{white-space:normal;overflow:visible;color:var(--ink)}
.te-sys .inf{width:15px;height:15px;border-radius:50%;border:1.2px solid var(--ink3);color:var(--ink3);font-size:9.5px;font-weight:700;display:grid;place-items:center;flex-shrink:0;align-self:center}
.te-sys.x .inf{background:var(--blue);border-color:var(--blue);color:#fff}
.gain{color:var(--green);font-weight:650}
.empty{text-align:center;padding:52px 20px;color:var(--ink3);font-size:13px;line-height:1.65}
.empty b{color:var(--ink2);font-size:15px;display:block;margin-bottom:6px}

/* Buttons */
.btn{display:flex;align-items:center;justify-content:center;gap:6px;padding:14px;border-radius:13px;
 font-size:14px;font-weight:650;transition:transform .12s,filter .12s}
.btn:active{transform:scale(.96);filter:brightness(.95)}
.btn-main{background:var(--blue);color:#fff}
.btn-2nd{background:var(--card);color:var(--ink);border:1.5px solid var(--line)}
.btn-green{background:var(--green);color:#fff}
.btn-soft-green{background:var(--green-bg);color:var(--green);border:1px solid rgba(14,143,78,.3)}
.btn-danger{background:var(--red-bg);color:var(--red);border:1px solid rgba(224,53,59,.3)}
.btn-ghost{border:1.5px dashed var(--line);color:var(--ink2);background:none;font-weight:550;padding:12px;border-radius:12px;font-size:12px;transition:all .15s}
.btn-ghost:active{border-color:var(--blue);color:var(--blue)}
.btn-sm{padding:9px 13px;font-size:12px;border-radius:10px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.row2>*,.row3>*{min-width:0}
input[type=date],input[type=time],input[type=month],input[type=datetime-local]{-webkit-appearance:none;appearance:none;min-width:0;max-width:100%;display:block;min-height:42px;text-align:left;font-family:inherit}
.fab{position:fixed;right:18px;bottom:calc(60px + var(--sab));width:54px;height:54px;border-radius:17px;
 background:var(--blue);color:#fff;font-size:27px;font-weight:300;display:grid;place-items:center;
 box-shadow:0 8px 28px rgba(10,95,255,.38);z-index:35;transition:transform .15s var(--spring)}
.fab:active{transform:scale(.87)}

/* Forms */
.fld{margin-bottom:11px}
.fld label{display:block;font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--ink3);margin-bottom:5px}
.fld input,.fld select,.fld textarea{width:100%;background:var(--bg);border:1px solid var(--line);border-radius:11px;padding:11px 12px}
.fld input:focus,.fld select:focus,.fld textarea:focus{border-color:rgba(10,95,255,.5);background:var(--card)}
.fld textarea{resize:none;line-height:1.5}
.selwrap{position:relative}
.selwrap select{appearance:none;-webkit-appearance:none;padding-right:30px}
.selwrap::after{content:"";position:absolute;right:12px;top:50%;margin-top:-5px;width:6px;height:6px;
 border-right:1.5px solid var(--ink3);border-bottom:1.5px solid var(--ink3);transform:rotate(45deg);pointer-events:none}
.seg{display:flex;background:var(--bg);border:1px solid var(--line);border-radius:11px;padding:3px}
.seg button{flex:1;padding:8px;border-radius:8px;font-size:12.5px;font-weight:600;color:var(--ink2);transition:all .2s}
.seg button.on{background:var(--card);color:var(--ink);box-shadow:0 1px 3px rgba(0,0,0,.08)}
.searchbar{display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--line);
 border-radius:999px;padding:11px 15px;margin-bottom:13px}
.searchbar input{flex:1;background:none;border:none;font-size:14px}
.searchbar svg{width:16px;height:16px;stroke:var(--ink3);fill:none;stroke-width:2;flex-shrink:0}

/* Pills */
.pills{display:flex;gap:7px;overflow-x:auto;scrollbar-width:none;padding:4px;margin-bottom:12px}
.pills::-webkit-scrollbar{display:none}
.pill{padding:7px 13px;border-radius:9px;font-size:12px;font-weight:600;border:1px solid var(--line);
 background:var(--card);color:var(--ink2);white-space:nowrap;transition:background .2s,color .2s,border-color .2s}
.pill.on{font-weight:700}

/* ============ PLANUNG ============ */
.fix{background:#1D1D1F;border-radius:16px;padding:12px 13px;margin-bottom:11px;color:#fff}
.fix-h{display:flex;justify-content:space-between;margin-bottom:4px;align-items:center}
.fix-h .t{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;opacity:.6}
.fix-h .warn{font-size:11px;font-weight:700;color:#FF7A72}
.fix-h .ok{font-size:11px;font-weight:700;color:#6EE787}
.day-h{display:flex;justify-content:space-between;font-size:11px;font-weight:700;color:#8E8E93;
 margin:14px 3px 3px;text-transform:uppercase;letter-spacing:.4px}
.sw{position:relative;border-radius:13px;margin-top:7px}
.sw-acts{position:absolute;top:0;bottom:0;right:0;width:192px;display:flex;border-radius:13px;overflow:hidden}
.sw-act{width:64px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
 color:#fff;font-size:9px;font-weight:700;opacity:0;transform:translateX(26px) scale(.8);
 transition:transform .28s var(--spring),opacity .2s,filter .1s}
.sw-act:active{filter:brightness(.85)}
.sw-act svg{width:17px;height:17px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.sw.open .sw-act{opacity:1;transform:translateX(0) scale(1)}
.sw.open .sw-act:nth-child(1){transition-delay:.06s}
.sw.open .sw-act:nth-child(2){transition-delay:.03s}
.sw.open .sw-act:nth-child(3){transition-delay:0s}
.sw-row{position:relative;display:flex;align-items:center;gap:9px;padding:12px;border-radius:13px;z-index:1;
 touch-action:pan-y;user-select:none;-webkit-user-select:none;-webkit-touch-callout:none;width:100%;overflow:hidden;white-space:nowrap;
 transition:width .42s var(--spring),box-shadow .2s;will-change:width;cursor:pointer}
.sw-row.drag{transition:box-shadow .2s;box-shadow:0 8px 22px rgba(0,0,0,.18)}
.sw.pinned .sw-row{outline:1.5px solid rgba(10,95,255,.55);outline-offset:-1.5px}
.sw-row.dark{background:#2C2C2E;color:#fff}
.sw-row.light{background:var(--card);border:1px solid var(--line);box-shadow:0 1px 3px rgba(0,0,0,.04)}
.sw-row .kennz{font-weight:800;font-size:13px;letter-spacing:.2px}
.sw-row .modell{font-size:9.5px;font-weight:500;margin-top:1px;line-height:1.15;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:110px}
.sw-row.dark .modell{color:rgba(255,255,255,.45)}
.sw-row.light .modell{color:var(--ink3)}
.sw-row .fade-el{transition:opacity .18s ease,max-width .3s ease;max-width:240px;overflow:hidden;text-overflow:ellipsis}
.sw.open .sw-row .fade-el{opacity:0;max-width:0}
.sw-row .sub{font-size:11px;flex:1;min-width:0}
.sw-row.dark .sub{color:rgba(255,255,255,.55)}
.sw-row.light .sub{color:var(--ink2)}
.sw-row .zeit{font-size:11px;font-weight:700;flex-shrink:0}
.sw-row.dark .zeit{color:rgba(255,255,255,.8)}
.sw-row.light .zeit{color:var(--ink2)}
.sw.done-anim{transition:opacity .4s ease .3s,max-height .45s ease .35s,margin .45s ease .35s;overflow:hidden}
.sw.done-anim.out{opacity:0;max-height:0!important;margin-top:0}
.checkflash{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:24px;height:24px;border-radius:50%;
 background:#34C759;display:grid;place-items:center;z-index:2;animation:checkPop .4s var(--spring)}
.checkflash svg{width:13px;height:13px;stroke:#fff;stroke-width:3;fill:none}
#pinwrap{max-height:0;overflow:hidden;transition:max-height .45s var(--spring),margin .45s var(--spring)}
#pinwrap.show{max-height:400px;margin-bottom:11px}
.pin-card{background:var(--card);border:2px solid rgba(10,95,255,.45);border-radius:18px;padding:14px;
 animation:cardSpring .5s var(--spring)}
.pin-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:9px}
.pin-tag{font-size:10px;font-weight:800;letter-spacing:.6px;color:var(--blue);text-transform:uppercase}
.pin-x{background:var(--gray-bg);border-radius:50%;width:26px;height:26px;display:grid;place-items:center;color:var(--ink2);transition:transform .15s}
.pin-x:active{transform:scale(.85)}
.pin-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px 14px;margin:10px 0}
.pin-kv{display:flex;justify-content:space-between;font-size:11.5px;padding:4px 0;border-bottom:1px solid var(--line2);
 opacity:0;animation:rowIn .35s ease forwards}
.pin-kv:nth-child(1){animation-delay:.08s}.pin-kv:nth-child(2){animation-delay:.13s}
.pin-kv:nth-child(3){animation-delay:.18s}.pin-kv:nth-child(4){animation-delay:.23s}
.pin-kv .k{color:var(--ink3)}.pin-kv .v{font-weight:600}
.pbar{height:6px;border-radius:3px;background:var(--gray-bg);overflow:hidden;flex:1}
.pbar i{display:block;height:100%;border-radius:3px;background:linear-gradient(90deg,#0A5FFF,#5E97FF);width:0;
 transition:width .8s cubic-bezier(.25,.8,.3,1) .25s}
.pin-foot{display:flex;align-items:center;gap:10px;margin-top:4px}
.kpis{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:14px}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:22px;padding:13px 14px 12px;text-align:left;
 display:flex;flex-direction:column;gap:6px;min-height:88px;overflow:hidden}
.kpi span{order:0;font-size:10px;color:var(--ink2);font-weight:600;letter-spacing:.03em}
.kpi b{order:1;display:block;font-size:30px;font-weight:230;letter-spacing:-.03em;line-height:1.04;
 white-space:nowrap;overflow:hidden;max-width:100%;font-variant-numeric:tabular-nums}
.kpi b small,.kpi b .u{font-size:12px;font-weight:500;color:var(--ink2);letter-spacing:0;margin-left:3px;font-style:normal}
.kpi .spark{order:2;margin-top:auto;color:var(--ink3);min-height:26px}
.kpi .ktrend{order:2;align-self:flex-start;font-size:10.5px;font-weight:600;padding:3px 9px;border-radius:999px;
 background:var(--gray-bg);color:var(--ink2);display:inline-flex;align-items:center;gap:4px;font-variant-numeric:tabular-nums}
.kpi .ktrend.up{color:var(--green)}
.kpi .ktrend.dn{color:var(--red)}
.kpis[style*="1fr 1fr 1fr"] .kpi b{font-size:18.5px;font-weight:400}

/* ============ AUFTRAGSMASKE ============ */
.sec{background:var(--card);border-radius:var(--rad);border:1px solid var(--line);margin-bottom:10px;overflow:hidden}
.sec-h{display:flex;align-items:center;gap:10px;padding:14px 15px;cursor:pointer;user-select:none;-webkit-user-select:none}
.sec-h .t{font-size:14px;font-weight:650;flex:1;min-width:0}
.sec-h .mini{font-size:11px;color:var(--ink3);font-weight:500;display:flex;align-items:center;gap:6px;flex-shrink:0}
.sec-b{max-height:0;overflow:hidden;transition:max-height .42s var(--ease)}
.sec.open>.sec-b{max-height:7000px}
.sec-in{padding:0 15px 15px}
.dotmark{width:7px;height:7px;border-radius:50%;background:var(--red);display:inline-block}
.hd-note{display:flex;align-items:center;gap:5px;background:var(--red-bg);color:var(--red);
 border:1px solid rgba(224,53,59,.3);border-radius:8px;padding:5px 8px;font-size:10.5px;font-weight:600;animation:fadeUp .3s ease}
.hd-note .nb{width:15px;height:17px;border:1.5px solid var(--red);border-radius:3px;display:grid;place-items:center;
 font-size:10px;font-weight:800;flex-shrink:0}
.abtn{display:flex;align-items:center;justify-content:center;padding:11px 4px;border-radius:11px;font-size:12px;
 font-weight:600;border:1px solid var(--line);background:var(--card);transition:all .14s}
.abtn:active{transform:scale(.95);background:var(--bg)}
.chips{display:flex;gap:7px;flex-wrap:wrap}
.chip{font-size:11.5px;font-weight:550;border-radius:999px;padding:8px 13px;background:var(--bg);border:1px solid var(--line);transition:all .15s}
.chip:active{transform:scale(.95)}
.chip.sent{background:var(--green);color:#fff;border-color:var(--green)}
/* Pakete */
.pak{border:1px solid var(--line);border-radius:13px;margin-bottom:10px;overflow:hidden}
.pak.ext-pak{border-left:2.5px solid var(--amber)}
.pak-h{display:flex;align-items:center;gap:7px;padding:12px;cursor:pointer;flex-wrap:wrap;user-select:none;-webkit-user-select:none}
.pak-h .pt{font-size:13px;font-weight:650;flex:1;min-width:100px}
.pak-b{max-height:0;overflow:hidden;transition:max-height .4s var(--ease)}
.pak.open>.pak-b{max-height:4400px}
.pak-in{padding:0 12px 12px}
.pak-kz{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:2px 0 4px}
.pak-kz select{font-size:11.5px;text-overflow:ellipsis;padding-right:26px}
.pos{display:flex;align-items:center;gap:10px;padding:9px 11px;background:var(--bg);border-radius:9px;margin-bottom:6px;font-size:12px}
.pos .pn{flex:1;font-weight:550;min-width:0}
.pos .pmeta{font-size:10px;color:var(--ink3);margin-top:2px;font-weight:400}
.pos .pp{font-weight:650;flex-shrink:0}
.pos.ext{background:rgba(194,113,10,.06);border:1px solid rgba(194,113,10,.25)}
.ext-note{font-size:11px;color:var(--amber);background:rgba(194,113,10,.06);border-radius:8px;padding:8px 11px;margin:2px 0 8px;line-height:1.5}
.ext-note .lk{color:var(--blue);font-weight:600;cursor:pointer}
.sum{display:flex;justify-content:space-between;align-items:baseline;padding:11px 2px 3px;font-size:13px}
.sum .sl{color:var(--ink2);font-size:11.5px}
.sum b{font-size:15px;font-weight:700}
/* Kalkulationsmodus */
.calc-pak{border:1px solid var(--line);border-radius:12px;margin-bottom:10px;overflow:hidden}
.calc-ph{display:flex;align-items:center;gap:8px;padding:11px 12px;background:var(--bg);font-size:12.5px;font-weight:650}
.calc-ph .ct{flex:1}
.calc-row{display:flex;align-items:center;gap:8px;padding:9px 12px;border-top:1px solid var(--line2);font-size:12px}
.calc-row .cn{flex:1;min-width:0}
.calc-row .csub{font-size:10px;color:var(--ink3);margin-top:1px}
.priceinp{width:76px;border:1px solid var(--line);border-radius:8px;padding:6px 8px;font-size:12px;font-weight:600;
 text-align:right;background:var(--card);font-variant-numeric:tabular-nums}
.priceinp:focus{border-color:rgba(10,95,255,.5)}
.disc{display:flex;align-items:center;gap:6px;padding:9px 12px;border-top:1px solid var(--line2);background:rgba(10,95,255,.03)}
.disc .dl{flex:1;font-size:11.5px;color:var(--blue);font-weight:600}
.disc-tog{display:flex;border:1px solid var(--line);border-radius:7px;overflow:hidden}
.disc-tog button{background:var(--card);padding:5px 9px;font-size:11px;font-weight:700;color:var(--ink3)}
.disc-tog button.on{background:var(--blue);color:#fff}
.calc-tot{display:flex;justify-content:space-between;padding:11px 12px;border-top:1px solid var(--line);
 font-size:13px;font-weight:700;background:var(--card)}
.calc-tot .gn{color:var(--green);font-size:11px;font-weight:600;margin-left:8px}
/* Kommunikation */
.ai-bar{display:flex;align-items:center;gap:10px;padding:11px 13px;background:var(--bg);border:1px solid var(--line);
 border-radius:12px;margin-bottom:14px;font-size:11.5px;line-height:1.45;color:var(--ink2)}
.ai-bar b{color:var(--ink);font-weight:600}
.ai-dot{position:relative;width:7px;height:7px;flex-shrink:0}
.ai-dot::after{content:"";position:absolute;inset:0;border-radius:50%;background:var(--blue)}
.ai-dot::before{content:"";position:absolute;inset:-4px;border-radius:50%;background:var(--blue);opacity:.3;animation:ping 1.8s cubic-bezier(0,0,.2,1) infinite}
.ai-dot.ok::after{background:var(--green)}.ai-dot.ok::before{display:none}
.tl{position:relative;padding-left:22px}
.tl::before{content:"";position:absolute;left:5px;top:4px;bottom:4px;width:1.5px;background:var(--line);
 transform-origin:top;animation:lineGrow .6s ease .1s both}
.te{position:relative;margin-bottom:14px;animation:fadeUp .35s ease both}
.te::before{content:"";position:absolute;left:-21px;top:3px;width:9px;height:9px;border-radius:50%;background:var(--card);
 border:2px solid var(--ink3);box-shadow:0 0 0 3px var(--card)}
.te.wa::before{border-color:var(--green)}.te.call::before{border-color:var(--blue)}
.te.mail::before{border-color:var(--violet)}.te.diag::before{border-color:var(--amber)}.te.pers::before{border-color:#D6A400}
.te-h{display:flex;align-items:center;gap:7px;font-size:11px;color:var(--ink3);margin-bottom:4px;flex-wrap:wrap}
.te-h .ch{font-weight:650;color:var(--ink)}
.te-h .sep{color:var(--line)}
.te-txt{font-size:12.5px;line-height:1.5;word-break:break-word}
.te-txt b{font-weight:600}
.te-badges{display:flex;gap:6px;margin-top:7px;flex-wrap:wrap}
.price-upd{display:flex;align-items:center;gap:7px;margin-top:8px;padding:7px 10px;background:rgba(14,143,78,.05);
 border:1px solid rgba(14,143,78,.2);border-radius:8px;font-size:11px}
.price-upd .old{color:var(--ink3);text-decoration:line-through}
.price-upd .new{font-weight:700}
.price-upd .delta{color:var(--green);font-weight:700;margin-left:auto}
.price-upd .delta.neg{color:var(--red)}
.src-btn{display:inline-flex;align-items:center;gap:5px;margin-top:8px;padding:6px 10px;background:var(--card);
 border:1px solid var(--line);border-radius:8px;font-size:11px;font-weight:600;color:var(--blue);transition:all .14s}
.src-btn:active{transform:scale(.95);background:var(--bg)}
.src-btn::before{content:"";width:11px;height:11px;border:1.5px solid var(--blue);border-radius:3px;flex-shrink:0}
.te.pend{background:var(--bg);border:1px solid var(--line);border-left:2.5px solid var(--amber);border-radius:11px;
 padding:11px 12px;margin-left:-12px}
.te.pend::before{display:none}
.te.just-conf{background:rgba(14,143,78,.05);border:1px solid rgba(14,143,78,.25);border-radius:11px;padding:11px 12px;margin-left:-12px}
.te.just-conf::before{display:none}
.te-btns{display:flex;gap:8px;margin-top:11px}
.te-btn{flex:1;padding:9px;border-radius:9px;font-size:12px;font-weight:600;transition:transform .12s}
.te-btn:active{transform:scale(.94)}
/* Fotos */
.fgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.foto{aspect-ratio:1;border-radius:11px;background:var(--bg);border:1px solid var(--line2);position:relative;overflow:hidden}
.foto img{width:100%;height:100%;object-fit:cover}
.foto .loc{position:absolute;left:0;right:0;bottom:0;background:rgba(0,0,0,.55);color:#fff;font-size:8px;
 padding:3px 4px;text-align:center;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.foto .fx{position:absolute;top:3px;right:3px;width:23px;height:23px;border-radius:50%;background:rgba(0,0,0,.5);
 color:#fff;display:grid;place-items:center;font-size:11px}
.foto.cam{border:1px dashed rgba(10,95,255,.4);background:rgba(10,95,255,.04);color:var(--blue);cursor:pointer;
 display:grid;place-items:center;font-size:22px;font-weight:300;transition:transform .12s}
.foto.cam:active{transform:scale(.93)}
/* Timer */
.timer{text-align:center;padding:4px 0 2px}
.timer .tt{font-size:40px;font-weight:300;font-variant-numeric:tabular-nums;letter-spacing:1px}
.eff{display:flex;justify-content:center;gap:18px;margin-top:10px;font-size:11px;color:var(--ink2)}
.eff div{text-align:center}
.eff b{display:block;font-size:14px;color:var(--ink);font-weight:650;margin-top:2px}
.eff .hi{color:var(--green)}.eff .lo{color:var(--amber)}
.tbtns{display:flex;gap:8px;justify-content:center;margin-top:13px}
.tbtn{padding:10px 24px;border-radius:11px;font-size:13px;font-weight:600;transition:transform .12s}
.tbtn:active{transform:scale(.94)}
/* Checkliste */
.cl{display:flex;align-items:center;gap:12px;padding:10px 2px;cursor:pointer}
.cb{width:23px;height:23px;border-radius:7px;border:1.5px solid var(--line);display:grid;place-items:center;
 transition:all .2s var(--spring);flex-shrink:0}
.cb svg{width:12px;height:12px;stroke:#fff;stroke-width:3;fill:none;stroke-dasharray:20;stroke-dashoffset:20;transition:stroke-dashoffset .25s ease .05s}
.cl.done .cb{background:var(--green);border-color:var(--green)}
.cl.done .cb svg{stroke-dashoffset:0}
.cl .ct{font-size:13px;transition:color .2s;flex:1}
.cl.done .ct{color:var(--ink3);text-decoration:line-through}
.prog{height:4px;border-radius:2px;background:var(--line);margin-top:10px;overflow:hidden}
.prog i{display:block;height:100%;background:var(--green);border-radius:2px;transition:width .4s cubic-bezier(.25,.8,.3,1)}
.doc-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-top:1px solid var(--line2);font-size:12.5px}
.doc-row:first-of-type{border-top:none}
.doc-ic{width:30px;height:30px;border-radius:8px;background:var(--bg);border:1px solid var(--line);display:grid;
 place-items:center;font-size:10px;font-weight:700;color:var(--ink2);flex-shrink:0}
/* Signatur */
.sigc{width:100%;height:120px;border:1px dashed var(--line);border-radius:12px;background:var(--bg);
 touch-action:none;cursor:crosshair;display:block}
.sig-foot{display:flex;justify-content:space-between;align-items:center;margin-top:8px;font-size:11px;color:var(--ink3)}
.sig-img{width:100%;border:1px solid var(--line);border-radius:12px;background:#fff}
/* Bottom Calc-Bar */
.calcbar{position:fixed;left:12px;right:12px;bottom:calc(var(--sab) + 10px);background:rgba(255,255,255,.9);
 backdrop-filter:blur(30px) saturate(1.3);-webkit-backdrop-filter:blur(30px) saturate(1.3);
 border:1px solid var(--line);border-radius:26px;padding:12px 15px 12px;z-index:40;box-shadow:0 14px 38px rgba(0,0,0,.18)}
.calcbar .calc{display:flex;justify-content:space-between;gap:8px;margin-bottom:10px}
.calcbar .calc div{font-size:10.5px;color:var(--ink3);font-weight:500}
.calcbar .calc b{display:block;font-size:15.5px;color:var(--ink);font-weight:380;margin-top:2px;font-variant-numeric:tabular-nums}
.calcbar .calc .gw b{color:var(--green)}
.calcbar .bbtns{display:flex;gap:9px}
.calcbar .bb{padding:13px;border-radius:12px;font-size:13.5px;font-weight:650;transition:transform .12s}
.calcbar .bb:active{transform:scale(.96)}
.bb-2nd{flex:0 0 92px;background:var(--bg);color:var(--ink);border:1px solid var(--line)}
.bb-main{flex:1;background:var(--blue);color:#fff}

/* ============ OVERLAYS ============ */
.sheet-bg{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:60;animation:fadeIn .2s ease;display:flex;align-items:flex-end}
.sheet{background:var(--card);border-radius:20px 20px 0 0;width:100%;max-height:88%;display:flex;flex-direction:column;
 animation:sheetUp .35s var(--spring);padding-bottom:var(--sab)}
.sheet-h{display:flex;align-items:center;padding:16px 16px 8px;gap:10px}
.sheet-h .grab{position:absolute;top:8px;left:50%;transform:translateX(-50%);width:36px;height:4px;border-radius:2px;background:var(--line)}
.sheet-h h2{font-size:16px;font-weight:750;flex:1}
.sheet-x{width:28px;height:28px;border-radius:50%;background:var(--gray-bg);display:grid;place-items:center;color:var(--ink2);font-size:13px}
.sheet-b{overflow-y:auto;padding:6px 16px 20px;-webkit-overflow-scrolling:touch}
.confirm-bg{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:70;display:grid;place-items:center;animation:fadeIn .18s ease;padding:24px}
.confirm{background:var(--card);border-radius:18px;padding:20px;width:100%;max-width:320px;animation:cardSpring .35s var(--spring)}
.confirm h3{font-size:15px;font-weight:750;margin-bottom:6px}
.confirm p{font-size:12.5px;color:var(--ink2);line-height:1.5;margin-bottom:16px}
.toast{position:fixed;bottom:calc(68px + var(--sab));left:50%;transform:translateX(-50%);background:#1D1D1F;color:#fff;
 padding:11px 18px;border-radius:12px;font-size:12.5px;font-weight:600;z-index:80;animation:toastIn .4s var(--spring);
 max-width:86%;text-align:center;box-shadow:0 8px 24px rgba(0,0,0,.25)}
.toast.err{background:var(--red)}

/* Liste generisch */
.lrow{display:flex;align-items:center;gap:11px;padding:13px 14px;cursor:pointer}
.lrow+.lrow{border-top:1px solid var(--line2)}
.lrow:active{background:var(--bg)}
.pos:active{filter:brightness(.96)}
.sec-h:active .t{opacity:.6}
.kv[data-act]:active{opacity:.6}
.lrow .av{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;font-size:13px;font-weight:750;flex-shrink:0}
.lrow .av svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.lrow .lt{flex:1;min-width:0}
.lrow .lt b{display:block;font-size:13.5px;font-weight:650;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lrow .lt span{font-size:11px;color:var(--ink3)}
.lrow .lr{text-align:right;flex-shrink:0}
.lrow .lr b{display:block;font-size:13px;font-weight:700}
.lrow .lr span{font-size:10px;color:var(--ink3)}
.warnrow{background:var(--amber-bg);border:1px solid rgba(194,113,10,.25);border-radius:11px;padding:9px 12px;
 font-size:11.5px;color:var(--amber);font-weight:600;margin-bottom:10px;line-height:1.5}
/* Finanzen Bars */
.bars{display:flex;align-items:flex-end;gap:8px;height:110px;padding:6px 2px 0}
.barw{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;height:100%;justify-content:flex-end}
.bar{width:100%;max-width:34px;border-radius:6px 6px 3px 3px;background:linear-gradient(180deg,#5E97FF,#0A5FFF);
 transition:height .6s cubic-bezier(.25,.8,.3,1);min-height:3px}
.barw span{font-size:9px;color:var(--ink3);font-weight:600}

/* ============ CONTEXT INDICATOR ============ */
.hdr.ctx-auftrag{background:rgba(10,95,255,.06);border-bottom:2px solid rgba(10,95,255,.35)}
.hdr.ctx-kunde{background:rgba(14,143,78,.06);border-bottom:2px solid rgba(14,143,78,.35)}
.hdr.ctx-fahrzeug{background:rgba(107,77,214,.06);border-bottom:2px solid rgba(107,77,214,.35)}
.hdr.ctx-kv{background:rgba(194,113,10,.06);border-bottom:2px solid rgba(194,113,10,.35)}
.hdr.ctx-auftrag .eyebrow{color:var(--blue)}
.hdr.ctx-kunde .eyebrow{color:var(--green)}
.hdr.ctx-fahrzeug .eyebrow{color:var(--violet)}
.hdr.ctx-kv .eyebrow{color:var(--amber)}
.hdr.ctx-auftrag .back-btn{background:rgba(10,95,255,.12);border-color:rgba(10,95,255,.3)}
.hdr.ctx-auftrag .back-btn::before{border-left-color:var(--blue);border-bottom-color:var(--blue)}
.hdr.ctx-kunde .back-btn{background:rgba(14,143,78,.12);border-color:rgba(14,143,78,.3)}
.hdr.ctx-kunde .back-btn::before{border-left-color:var(--green);border-bottom-color:var(--green)}
.hdr.ctx-fahrzeug .back-btn{background:rgba(107,77,214,.12);border-color:rgba(107,77,214,.3)}
.hdr.ctx-fahrzeug .back-btn::before{border-left-color:var(--violet);border-bottom-color:var(--violet)}
.hdr.ctx-kv .back-btn{background:rgba(194,113,10,.12);border-color:rgba(194,113,10,.3)}
.hdr.ctx-kv .back-btn::before{border-left-color:var(--amber);border-bottom-color:var(--amber)}
.hdr.ctx-anfrage{background:rgba(0,148,180,.06);border-bottom:2px solid rgba(0,148,180,.35)}
.hdr.ctx-anfrage .eyebrow{color:#0094B4}
.hdr.ctx-anfrage .back-btn{background:rgba(0,148,180,.12);border-color:rgba(0,148,180,.3)}
.hdr.ctx-anfrage .back-btn::before{border-left-color:#0094B4;border-bottom-color:#0094B4}
/* Sonstiges-Freitext */
.son-inp{margin-top:6px;width:100%;background:var(--bg);border:1px solid rgba(10,95,255,.4);border-radius:11px;padding:11px 12px;font-size:13px;color:var(--ink)}
/* Textposition */
.pos.text-pos{background:transparent;border:1px dashed var(--line);font-style:italic;color:var(--ink2);opacity:.8}
/* Kundenansicht */
.kansicht-bg{position:fixed;inset:0;background:var(--bg);z-index:90;overflow-y:auto;padding:calc(var(--sat)+20px) 16px calc(40px + var(--sab));animation:fadeIn .2s ease}
/* Suche Kacheln */
.search-kachel{display:flex;align-items:center;gap:11px;padding:12px;border:1px solid var(--line);border-radius:12px;margin-bottom:8px;cursor:pointer;background:var(--card);transition:all .15s var(--spring)}
.search-kachel:active{transform:scale(.98);background:var(--bg)}
.search-kachel.sel{border-color:var(--blue);background:var(--blue-bg)}

/* ============ TERMINKALENDER ============ */
.kal-time{font-size:8.5px;font-weight:700;color:var(--ink3);padding:5px 4px 0;text-align:right;background:var(--bg);border-right:1px solid var(--line2);width:34px;flex-shrink:0}
.kal-cell{border-left:1px solid var(--line2);min-height:48px;padding:2px;overflow:hidden;cursor:pointer;transition:background .12s}
.kal-cell:active{background:var(--bg)}
.kal-cell.today{background:rgba(10,95,255,.03);border-left-color:rgba(10,95,255,.3)}
.kal-hd-cell{font-size:10px;font-weight:700;text-align:center;padding:7px 2px;border-left:1px solid var(--line2)}
.kal-hd-cell.today{color:var(--blue)}
.kal-evt{border-radius:5px;padding:2px 5px;font-size:9px;font-weight:700;cursor:pointer;margin-bottom:2px;color:#fff;display:block;width:100%;text-align:left;border:none;font-family:inherit;line-height:1.3;transition:filter .12s}
.kal-evt:active{filter:brightness(.85)}
/* ============ PRINT / RECHNUNG ============ */
#printarea{display:none}
@media print{
 body{position:static;overflow:visible;background:#fff}
 #app{display:none}
 #printarea{display:block;font-family:-apple-system,'Segoe UI',sans-serif;color:#111;padding:8mm;font-size:11px}
 #printarea h1{font-size:20px;margin-bottom:2px}
 #printarea .ph{display:flex;justify-content:space-between;margin-bottom:22px}
 #printarea .small{font-size:9.5px;color:#666;line-height:1.5}
 #printarea table{width:100%;border-collapse:collapse;margin:14px 0}
 #printarea th{text-align:left;font-size:9.5px;text-transform:uppercase;letter-spacing:.05em;color:#666;
  border-bottom:1.5px solid #111;padding:5px 6px}
 #printarea td{padding:6px;border-bottom:1px solid #ddd;vertical-align:top}
 #printarea .tr{text-align:right}
 #printarea .paksep td{background:#f4f4f5;font-weight:700;font-size:10.5px}
 #printarea .tots{margin-left:auto;width:230px}
 #printarea .tots div{display:flex;justify-content:space-between;padding:3px 6px;font-size:11px}
 #printarea .tots .big{border-top:1.5px solid #111;font-weight:800;font-size:13px;padding-top:6px;margin-top:3px}
 #printarea .foot{margin-top:28px;font-size:9.5px;color:#666;line-height:1.6;border-top:1px solid #ddd;padding-top:10px}
}
/* ============ DESIGN 3.3 — Premium-Look in Weiss (Basis) ============ */
body{background:radial-gradient(70% 42% at 85% -12%,rgba(14,156,142,.06),transparent 60%),
 radial-gradient(55% 38% at -12% 108%,rgba(190,209,74,.07),transparent 58%),#F4F4F6}
.main{background-image:linear-gradient(rgba(17,17,20,.03) 1px,transparent 1px),
 linear-gradient(90deg,rgba(17,17,20,.03) 1px,transparent 1px);background-size:44px 44px}
.card,.sec,.pak,.kpi{background:rgba(255,255,255,.78);border-color:rgba(17,17,20,.045);
 box-shadow:0 10px 30px rgba(17,17,20,.06);
 backdrop-filter:blur(20px) saturate(1.15);-webkit-backdrop-filter:blur(20px) saturate(1.15)}

 const secPak=sec('pak','Pakete & Kalkulation',a.pakete.length+' Paket'+(a.pakete.length!==1?'e':''),`

   const lastW=f.wartung||S.auftraege.filter(x2=>x2.fzgId===a.fzgId&&x2.id!==a.id&&x2.status==='abgeholt').map(x2=>x2.abgabe||x2.annahme).sort().pop();

function initSig(){$$('.sigc').forEach(cv=>{if(cv._init)return;cv._init=true;
 const ctx=cv.getContext('2d');
 const size=()=>{const r=cv.getBoundingClientRect();if(!r.width)return false;
  cv.width=r.width*2;cv.height=240;ctx.scale(2,2);ctx.lineWidth=2;ctx.lineCap='round';ctx.strokeStyle='#16161A';cv._sized=true;return true};
 setTimeout(size,80);
 let d=false,lx=0,ly=0;cv._drawn=false;
 const pos=e=>{const r=cv.getBoundingClientRect();const t=e.touches?e.touches[0]:e;return[t.clientX-r.left,t.clientY-r.top]};
 const st=e=>{if(!cv._sized&&!size())return;d=true;[lx,ly]=pos(e);e.preventDefault()};
 const mv=e=>{if(!d)return;const[x,y]=pos(e);ctx.beginPath();ctx.moveTo(lx,ly);ctx.lineTo(x,y);ctx.stroke();[lx,ly]=[x,y];cv._drawn=true;e.preventDefault()};
 const end=()=>d=false;
 cv.addEventListener('mousedown',st);cv.addEventListener('mousemove',mv);
 cv.addEventListener('mouseup',end);cv.addEventListener('mouseleave',end);
 cv.addEventListener('touchstart',st,{passive:false});cv.addEventListener('touchmove',mv,{passive:false});cv.addEventListener('touchend',end);cv.addEventListener('touchcancel',end)})}
/* Canvas immer relativ zum geklickten Button suchen — behebt „Unterschrift lässt sich nicht speichern"
   in der Kundenansicht (dort heißen die Canvas-IDs sigk-/sigk2-, nicht sig-/sig2-) */
function sigCanvasFor(el,sk){

function buildInvoiceHtml(a,pakIds,reNr){
 const k=kunde(a.kundeId)||{},f=fzg(a.fzgId)||{},fi=S.settings.firma;
 const paks=a.pakete.filter(p=>pakIds.includes(p.id));
 const sub=paks.reduce((s,pk)=>s+pakNetto(pk),0);
 const ordRabAnteil=ordSub(a)>0?Math.round(rabCt(ordSub(a),a.rabatt)*sub/ordSub(a)):0;
 const netto=Math.max(0,sub-ordRabAnteil);
 const mwst=Math.round(netto*S.settings.mwst/100),brutto=netto+mwst;
 const restAnz=Math.max(0,(a.anzahlungCt||0)-(a.anzVerrCt||0));
 const anz=Math.min(restAnz,brutto);
 const rows=paks.map(pk=>{
  const prab=rabCt(pakBrutto(pk),pk.rabatt);
  return `<tr class="paksep"><td colspan="4">${esc(pk.name)} · ${pk.klass==='so'&&pk.klassTxt?esc(pk.klassTxt):KLASS[pk.klass][0]}${pk.zahler!=='kunde'?' · zahlt: '+(pk.zahler==='son'&&pk.zahlerTxt?esc(pk.zahlerTxt):ZAHLER[pk.zahler]):''}</td></tr>`+
  pk.pos.map(p=>(p.typ==='text'||p.typ==='befund')?
   `<tr><td colspan="4" style="font-size:10px;color:#444">${esc(p.bez)}${p.abhilfe?' — Abhilfe: '+esc(p.abhilfe):''}</td></tr>`
  :`<tr><td>${esc(p.bez)}${p.ext?' (Erweiterung)':''}${p.zahler&&p.zahler!==(pk.zahler||'kunde')?' <span style="font-size:9px;color:#555">· zahlt: '+(p.zahler==='son'&&p.zahlerTxt?esc(p.zahlerTxt):ZAHLER[p.zahler]||'')+'</span>':''}${p.notizKunde?'<br><span style="font-size:9px;color:#555">'+esc(p.notizKunde)+'</span>':''}</td>
   <td class="tr">${p.typ==='teil'?(p.menge||1)+' ×':(p.aw?String(p.aw).replace('.',',')+' AW':'')}</td>
   <td class="tr">${fmt(p.vkCt)}</td><td class="tr">${fmt(posNetto(p))}</td></tr>`).join('')+
  (prab?`<tr><td colspan="3">Rabatt Paket</td><td class="tr">– ${fmt(prab)}</td></tr>`:'')}).join('');
 return {netto,mwst,brutto,anz,html:`
  <div class="ph"><div><h1>${esc(fi.name)}</h1><div class="small">${esc(fi.adresse)}<br>${esc(fi.tel)} · ${esc(fi.email)}${fi.ustid?'<br>USt-IdNr.: '+esc(fi.ustid):fi.steuernr?'<br>Steuernr.: '+esc(fi.steuernr):''}</div></div>
   <div class="small" style="text-align:right"><b style="font-size:14px;color:#111">${reNr?'Rechnung '+reNr:'Auftragsübersicht'}</b><br>
    Rechnungsdatum: ${new Date().toLocaleDateString('de-DE')}<br>Leistungsdatum: ${new Date((a.abgabe||todayISO())+'T00:00').toLocaleDateString('de-DE')}<br>Auftrag: ${a.nr}<br>Fahrzeug: ${esc(f.kennz||'')} · ${esc((f.marke||'')+' '+(f.modell||''))}<br>
    ${a.kmAn!=null?'KM: '+a.kmAn.toLocaleString('de-DE'):''}</div></div>
  <div class="small" style="margin-bottom:4px">Kunde</div>
  <div><b>${esc(k.name||'')}</b>${k.ansprechpartner?'<br>z. Hd. '+esc(k.ansprechpartner):''}<br><span class="small">${esc(k.adresse||'')}</span></div>
  <table><tr><th>Position</th><th class="tr">Menge</th><th class="tr">Einzel</th><th class="tr">Gesamt</th></tr>${rows}</table>
  <div class="tots">
   ${ordRabAnteil?`<div><span>Rabatt Auftrag</span><span>– ${fmt(ordRabAnteil)}</span></div>`:''}
   <div><span>Netto</span><span>${fmt(netto)}</span></div>
   <div><span>MwSt ${S.settings.mwst} %</span><span>${fmt(mwst)}</span></div>
   <div class="big"><span>Brutto</span><span>${fmt(brutto)}</span></div>
   ${anz?`<div><span>abzgl. Anzahlung</span><span>– ${fmt(anz)}</span></div><div class="big"><span>Zu zahlen</span><span>${fmt(brutto-anz)}</span></div>`:''}
  </div>
  <div class="foot">${S.settings.garantieMonate>0?S.settings.garantieMonate+' Monate Garantie auf alle Arbeiten. ':''}${reNr?'Zahlbar innerhalb von '+(S.settings.mahnTage||14)+' Tagen ohne Abzug.':'Unverbindliche Übersicht — keine Rechnung.'}
   ${fi.iban?'<br>IBAN: '+esc(fi.iban):''}${fi.web?' · '+esc(fi.web):''}</div>`};
}

function doBill(a,pakIds){
 const paks=a.pakete.filter(p=>pakIds.includes(p.id));
 confirmBox('Rechnung erstellen?',paks.map(p=>'„'+esc(p.name)+'"').join(', ')+' wird abgerechnet und als Rechnung gedruckt.','Rechnung erstellen',()=>{
  const y=new Date().getFullYear();
  const reNr='RE-'+y+'-'+String(S.settings.nextRe++).padStart(4,'0');
  const inv=buildInvoiceHtml(a,pakIds,reNr);
  const gewinn=paks.reduce((s,pk)=>s+pakGewinn(pk),0);
  S.rechnungen.push({id:'r'+uid(),nr:reNr,auftragId:a.id,datum:todayISO(),nettoCt:inv.netto,mwstCt:inv.mwst,bruttoCt:inv.brutto,gewinnCt:gewinn,paketIds:pakIds});
  a.komm.push({id:'m'+uid(),kanal:'sys',ts:Date.now(),txt:'Rechnung '+reNr+' erstellt — '+fmt(inv.brutto)+' brutto.',preisCt:inv.brutto,vorherCt:null,nachherCt:null,bezug:null,status:'best',orig:null});
  paks.forEach(p=>{p.abger=true;if(p.status!=='fertig')p.status='fertig'});
  if(inv.anz)a.anzVerrCt=(a.anzVerrCt||0)+inv.anz;
  if(a.pakete.every(p=>p.abger)&&a.status!=='abgeholt')a.status='fertig';
  save();render();toast(reNr+' erstellt');
  $('#printarea').innerHTML=inv.html;setTimeout(()=>window.print(),120)},false)}

/* Fahrzeugschein-Scan: Foto → /api/scan → Felder ausfüllen (mode: fzg-Sheet oder ord-Sheet) */
ACT['schein-scan']=el=>{
 const inp=$('#scheininp');if(!inp)return;
 inp.dataset.mode=el.dataset.mode||'fzg';
 if(!inp._b){inp._b=true;inp.addEventListener('change',e=>{
  const file=e.target.files[0];e.target.value='';if(!file)return;
  const st=$('#schein-status');
  if(st)st.innerHTML='<div style="font-size:11.5px;color:var(--blue);background:var(--blue-bg);border-radius:9px;padding:9px 11px;margin-bottom:12px">Wird analysiert — einen Moment …</div>';
  /* PDF (z. B. Fahrzeugschein als Datei auf dem iPhone): direkt als Base64 senden */
  if(file.type==='application/pdf'||/\.pdf$/i.test(file.name||'')){
   const rd=new FileReader();
   rd.onload=()=>{const b64=String(rd.result).split(',')[1];inp._send('application/pdf',b64)};
   rd.readAsDataURL(file);return}
  /* Bild verkleinern (max 1600px) und als Base64 senden */
  const img=new Image();const url=URL.createObjectURL(file);
  img.onerror=()=>{URL.revokeObjectURL(url);
   if(st)st.innerHTML='<div style="font-size:11.5px;color:var(--amber);background:var(--amber-bg);border-radius:9px;padding:9px 11px;margin-bottom:12px">Dateiformat wird auf diesem Gerät nicht unterstützt — bitte als Foto (JPG) oder PDF wählen.</div>'};
  img.onload=()=>{
   URL.revokeObjectURL(url);
   const max=1600,sc=Math.min(1,max/Math.max(img.width,img.height));
   const cv=document.createElement('canvas');cv.width=Math.round(img.width*sc);cv.height=Math.round(img.height*sc);
   cv.getContext('2d').drawImage(img,0,0,cv.width,cv.height);
   inp._send('image/jpeg',cv.toDataURL('image/jpeg',0.85).split(',')[1])};
  img.src=url})}
 inp._send=async(mediaType,b64)=>{
  const st=$('#schein-status');
  try{
   const ctl=new AbortController();const to=setTimeout(()=>ctl.abort(),30000);
   const r=await fetch('/api/scan',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({media_type:mediaType,data:b64}),signal:ctl.signal});
   clearTimeout(to);
   if(!r.ok){const j=await r.json().catch(()=>({}));throw new Error(j.error||('HTTP '+r.status))}
   const {fields:fl={}}=await r.json();
   const setV=(id,v)=>{const n=$(id);if(n&&v&&!n.value)n.value=v};
   if(inp.dataset.mode==='ord'){
    setV('#no-fk',(fl.kennzeichen||'').toUpperCase());
    setV('#no-fma',fl.marke||'');setV('#no-fmo',fl.modell||'');
    setV('#no-fvin',fl.vin||'');
    setV('#no-fbj',fl.baujahr||(fl.erstzulassung||'').slice(0,4));
    setV('#no-fhu',(fl.hu_datum||'').slice(0,7));
    setV('#no-ffa',fl.farbe||'');
    const kr=$('#no-fkr');if(kr&&fl.kraftstoff&&!kr.value){const opt=[...kr.options].find(o=>o.value.toLowerCase().startsWith(String(fl.kraftstoff).toLowerCase().slice(0,4)));if(opt)kr.value=opt.value}
   }else{
    setV('#fz-kz',(fl.kennzeichen||'').toUpperCase());
    setV('#fz-ma',fl.marke||'');setV('#fz-mo',fl.modell||'');
    setV('#fz-v',fl.vin||'');
    setV('#fz-bj',fl.baujahr||(fl.erstzulassung||'').slice(0,4));
    setV('#fz-hu',(fl.hu_datum||'').slice(0,7));
    setV('#fz-kr',fl.kraftstoff||'');setV('#fz-fa',fl.farbe||'');
   }
   const got=['kennzeichen','marke','modell','vin','baujahr','hu_datum'].filter(k=>fl[k]).length;
   if(st)st.innerHTML=got?`<div style="font-size:11.5px;color:var(--green);background:var(--green-bg);border-radius:9px;padding:9px 11px;margin-bottom:12px">${got} Felder erkannt und eingetragen — bitte kurz prüfen.</div>`
    :'<div style="font-size:11.5px;color:var(--amber);background:var(--amber-bg);border-radius:9px;padding:9px 11px;margin-bottom:12px">Nichts erkannt — Foto näher, gerade und bei gutem Licht aufnehmen.</div>';
  }catch(err){
   if(st)st.innerHTML=`<div style="font-size:11.5px;color:var(--amber);background:var(--amber-bg);border-radius:9px;padding:9px 11px;margin-bottom:12px">Scan nicht möglich (${esc(err.name==='AbortError'?'Zeitüberschreitung':String(err.message||err))}). Auf Vercel muss ANTHROPIC_API_KEY gesetzt sein — Daten bitte von Hand eintragen.</div>`;
  }};
 inp.click()};

  months.push({lbl:['Jan','Feb','Mär','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Dez'][d.getMonth()],
   u:mRe.reduce((s,r)=>s+r.bruttoCt,0),g:mRe.reduce((s,r)=>s+(r.gewinnCt||0),0),n:mRe.length})}
 const maxU=Math.max(...months.map(m=>m.u),1);
 /* Umsatz nach Mitarbeiter (letzte 90 Tage) */
 const maUms={};const t90=Date.now()-90*86400000;
 S.auftraege.forEach(a=>{if(!a.mitarbeiterId)return;
  const re=S.rechnungen.filter(r=>r.auftragId===a.id&&Date.parse(r.datum)>=t90);
  re.forEach(r=>{maUms[a.mitarbeiterId]=(maUms[a.mitarbeiterId]||0)+r.bruttoCt})});
 /* Top-Kunden (alle Zeit — kein Zeitfenster, UI zeigt bewusst keine Monatsangabe) */
 const kunUms={};S.rechnungen.forEach(r=>{const a=auftrag(r.auftragId);if(!a)return;kunUms[a.kundeId]=(kunUms[a.kundeId]||0)+r.bruttoCt});

 /* Statusverteilung */

const CRC_T=(()=>{const t=new Uint32Array(256);for(let n=0;n<256;n++){let c=n;for(let k=0;k<8;k++)c=c&1?0xEDB88320^(c>>>1):c>>>1;t[n]=c}return t})();
const crc32=d=>{let c=0xFFFFFFFF;for(let i=0;i<d.length;i++)c=CRC_T[(c^d[i])&0xFF]^(c>>>8);return(c^0xFFFFFFFF)>>>0};
const xEnc=s=>new TextEncoder().encode(s);
const xEsc=s=>String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
function makeZip(files){ /* Store-only ZIP */
 const now=new Date();
 const dosT=((now.getHours()<<11)|(now.getMinutes()<<5)|(now.getSeconds()>>1))&0xFFFF;
 const dosD=(((now.getFullYear()-1980)<<9)|((now.getMonth()+1)<<5)|now.getDate())&0xFFFF;
 let parts=[],cd=[],off=0;
 const u16=v=>[v&255,(v>>8)&255],u32=v=>[v&255,(v>>8)&255,(v>>16)&255,(v>>24)&255];
 for(const f of files){
  const name=xEnc(f.name),data=f.data,crc=crc32(data);
  const lh=new Uint8Array([80,75,3,4,20,0,0,8,0,0,...u16(dosT),...u16(dosD),...u32(crc),...u32(data.length),...u32(data.length),...u16(name.length),0,0]);
  parts.push(lh,name,data);
  cd.push({name,crc,size:data.length,off});
  off+=lh.length+name.length+data.length}
 const cdStart=off;let cdLen=0;
 for(const e of cd){
  const h=new Uint8Array([80,75,1,2,20,0,20,0,0,8,0,0,...u16(dosT),...u16(dosD),...u32(e.crc),...u32(e.size),...u32(e.size),...u16(e.name.length),0,0,0,0,0,0,0,0,...u32(0),...u32(e.off)]);
  parts.push(h,e.name);cdLen+=h.length+e.name.length}
 parts.push(new Uint8Array([80,75,5,6,0,0,0,0,...u16(cd.length),...u16(cd.length),...u32(cdLen),...u32(cdStart),0,0]));
 let total=0;parts.forEach(p=>total+=p.length);
 const out=new Uint8Array(total);let p=0;parts.forEach(x=>{out.set(x,p);p+=x.length});
 return out}
const colRef=i=>{let s='';i++;while(i>0){s=String.fromCharCode(65+(i-1)%26)+s;i=Math.floor((i-1)/26)}return s};
function sheetXml(rows){
 let xml='<?xml version="1.0" encoding="UTF-8" standalone="yes"?><worksheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main"><sheetData>';
 rows.forEach((row,ri)=>{xml+='<row r="'+(ri+1)+'">';
  row.forEach((v,ci)=>{if(v===null||v===undefined||v==='')return;
   const r=colRef(ci)+(ri+1);
   if(typeof v==='number'&&isFinite(v))xml+='<c r="'+r+'"><v>'+v+'</v></c>';
   else xml+='<c r="'+r+'" t="inlineStr"><is><t xml:space="preserve">'+xEsc(v)+'</t></is></c>'});
  xml+='</row>'});
 return xml+'</sheetData></worksheet>'}
function buildXlsx(sheets){
 const files=[];
 let ct='<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types"><Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/><Default Extension="xml" ContentType="application/xml"/><Override PartName="/xl/workbook.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.sheet.main+xml"/>';
 let wb='<?xml version="1.0" encoding="UTF-8" standalone="yes"?><workbook xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships"><sheets>';
 let rels='<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">';
 sheets.forEach((s,i)=>{
  ct+='<Override PartName="/xl/worksheets/sheet'+(i+1)+'.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.worksheet+xml"/>';
  wb+='<sheet name="'+xEsc(s.name)+'" sheetId="'+(i+1)+'" r:id="rId'+(i+1)+'"/>';
  rels+='<Relationship Id="rId'+(i+1)+'" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/worksheet" Target="worksheets/sheet'+(i+1)+'.xml"/>';
  files.push({name:'xl/worksheets/sheet'+(i+1)+'.xml',data:xEnc(sheetXml(s.rows))})});
 files.unshift(
  {name:'[Content_Types].xml',data:xEnc(ct+'</Types>')},
  {name:'_rels/.rels',data:xEnc('<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="xl/workbook.xml"/></Relationships>')},
  {name:'xl/workbook.xml',data:xEnc(wb+'</sheets></workbook>')},
  {name:'xl/_rels/workbook.xml.rels',data:xEnc(rels+'</Relationships>')});
 return makeZip(files)}

function ruleAnalyze(txt){
 const t=(txt||'').toLowerCase();
 const hit=w=>w.some(x=>t.includes(x));
 let prio='niedrig',grund='Standardanliegen — zeitnah beantworten.';
 if(hit(['brems','lenk','qualm','rauch','verliert öl','ölfleck','überhitzt','liegen geblieben','geht aus','licht defekt','licht kaputt']))
  {prio='hoch';grund='Sicherheitsrelevant — Kunde nicht warten lassen.'}
 else if(hit(['tüv','hu ','hu,','hu.','warnleuchte','motorleuchte','geräusch','klapper','quietsch','ruckelt','frist']))
  {prio='mittel';grund='Termingebunden oder Diagnose nötig — heute reagieren.'}
 let wert=25000,betreff='';
 if(hit(['steuerkette'])){wert=145000;betreff='Steuerkette'}
 else if(hit(['kupplung'])){wert=120000;betreff='Kupplung'}
 else if(hit(['zahnriemen'])){wert=95000;betreff='Zahnriemen'}
 else if(hit(['brems'])){wert=55000;betreff='Bremsen'}
 else if(hit(['tüv','hu'])){wert=42000;betreff='HU / TÜV'}
 else if(hit(['inspektion','service','ölwechsel','wartung'])){wert=38000;betreff='Inspektion / Service'}
 else if(hit(['klima'])){wert=15000;betreff='Klimaservice'}
 else if(hit(['reifen','räder'])){wert=32000;betreff='Reifen / Räder'}
 else betreff=(txt||'').split(/\s+/).slice(0,4).join(' ');
 const anrede=prio==='hoch'?'wir nehmen das ernst — bei sicherheitsrelevanten Themen sollten Sie nicht lange fahren.':'vielen Dank für Ihre Anfrage.';
 const antwort='Guten Tag, '+anrede+' Wir können Ihr Fahrzeug kurzfristig ansehen: Passt Ihnen morgen 8:00 oder 13:30 Uhr? Vor jeder Arbeit erhalten Sie einen festen Preis. Freundliche Grüße, Ihre mehanicar Meisterwerkstatt';
 return{prio,grund,antwort,wert,betreff,quelle:'regel'};
}
/*TEST-RULE-END*/
async function kiAnalyze(txt,kanal,name){
 const cfg=(S.settings.ki||{});
 if(!cfg.endpoint)return ruleAnalyze(txt);
 try{
  const ctl=new AbortController();const to=setTimeout(()=>ctl.abort(),14000);
  const r=await fetch(cfg.endpoint,{method:'POST',headers:{'Content-Type':'application/json'},
   body:JSON.stringify({text:txt,kanal,name,model:cfg.model||'claude-haiku-4-5-20251001'}),signal:ctl.signal});
  clearTimeout(to);
  if(!r.ok)throw new Error('HTTP '+r.status);
  const d=await r.json();
  if(!d||!d.prio||!PRIO[d.prio])throw new Error('Antwortformat');
  const rb=ruleAnalyze(txt);
  return{prio:d.prio,grund:String(d.grund||'').slice(0,200),antwort:String(d.antwort||'').slice(0,600),
   wert:Math.max(0,Math.round(+d.wert||0)*100)||rb.wert,betreff:String(d.betreff||rb.betreff).slice(0,50),quelle:'ki'};
 }catch(e){const f=ruleAnalyze(txt);f.quelle='regel';f.fehler=e.name==='AbortError'?'Zeitüberschreitung':String(e.message||e);return f}
}

    .map(a=>a.abgabe||a.annahme)].filter(Boolean).sort().pop();

    out.push({key:'sv:'+f.id,typKey:'sv',typ:'Service fällig',tag:'letzter Besuch vor '+Math.round((Date.parse(t)-Date.parse(last))/86400000/30)+' Mon.',

   </div>

   </div>`).join('')
   :`<div style="display:grid;grid-template-columns:68px repeat(10,1fr);gap:3px;margin-bottom:3px">
    <div style="font-size:10px;font-weight:700;color:var(--ink3);padding-top:4px">Alle</div>
    ${days.map(d=>{const os=act.filter(a=>inRange(a,d));
     return `<div style="background:var(--card);border:1.5px solid ${d===today?'rgba(10,95,255,.35)':'var(--line)'};border-radius:8px;min-height:40px;padding:3px">${os.map(chip).join('')}</div>`}).join('')}

let persSec='krankmeldung';
function vPersonal(){

 const now=todayISO();const yr=now.slice(0,4);
 const hhmm=ms=>{const m=Math.round(ms/60000);return Math.floor(m/60)+':'+String(m%60).padStart(2,'0')};
 const hrs=teamHours();
 const maHrsYr={};S.auftraege.forEach(a=>(a.zeiten||[]).forEach(z=>{if(!z.end)return;
  if(new Date(z.start).getFullYear()!==+yr)return;
  const mid=z.mid||a.mitarbeiterId||'m1';maHrsYr[mid]=(maHrsYr[mid]||0)+(z.end-z.start)}));
 const kmThisYr=km.filter(k=>k.von&&k.von.startsWith(yr));

 const seg=`<div class="seg" style="margin-bottom:12px">
  <button class="${persSec==='krankmeldung'?'on':''}" data-act="pers-seg" data-v="krankmeldung">Krankmeldungen</button>
  <button class="${persSec==='urlaub'?'on':''}" data-act="pers-seg" data-v="urlaub">Urlaub</button>

 let body='';

  body=`<div class="kpis stag" style="grid-template-columns:1fr 1fr">
   <div class="kpi"><b class="num" style="${kmThisYr.length>5?'color:var(--amber)':''}">${kmThisYr.length}</b><span>Krankmeldungen ${yr}</span></div>
   <div class="kpi"><b class="num">${kmThisYr.reduce((s,k)=>s+((Date.parse(k.bis)-Date.parse(k.von))/86400000+1),0)}</b><span>Krankheitstage ${yr}</span></div></div>
  <div class="lbl">Einträge · ${km.length}</div>
  <div class="card">${km.slice().reverse().slice(0,30).map(k=>{const m=mita(k.mid);
   return `<div class="lrow" style="cursor:default"><div class="av" style="background:${m?m.farbe+'14':'var(--red-bg)'};color:${m?m.farbe:'var(--red)'};font-weight:800">${m?esc(m.kuerzel):'?'}</div>
    <div class="lt"><b>${m?esc(m.name):'—'}</b><span>${k.von} – ${k.bis}${k.notiz?' · '+esc(k.notiz):''}</span></div>
    <button style="color:var(--red);padding:8px;font-size:14px" data-act="km-del" data-id="${k.id}">${xIco(13)}</button></div>`}).join('')||
   '<div class="empty" style="padding:16px"><b>Keine Einträge</b>Füge Krankmeldungen mit + hinzu.</div>'}</div>`;
 } else if(persSec==='urlaub'){
  body=`<div class="kpis stag" style="grid-template-columns:1fr 1fr">
   <div class="kpi"><b class="num">${urlThisYr.length}</b><span>Urlaubsanträge ${yr}</span></div>
   <div class="kpi"><b class="num">${urlThisYr.reduce((s,u)=>s+((Date.parse(u.bis)-Date.parse(u.von))/86400000+1),0)}</b><span>Urlaubstage ${yr}</span></div></div>
  <div class="lbl">Urlaub · ${urlaub.length}</div>
  <div class="card">${urlaub.slice().reverse().slice(0,30).map(u=>{const m=mita(u.mid);
   const ok=u.bis<now,aktiv=u.von<=now&&u.bis>=now;
   return `<div class="lrow" style="cursor:default"><div class="av" style="background:${m?m.farbe+'14':'var(--gray-bg)'};color:${m?m.farbe:'var(--ink2)'};font-weight:800">${m?esc(m.kuerzel):'?'}</div>
    <div class="lt"><b>${m?esc(m.name):'—'}</b><span>${u.von} – ${u.bis}${u.notiz?' · '+esc(u.notiz):''}</span></div>
    <span class="tag ${ok?'t-gray':aktiv?'t-amber':'t-blue'}">${ok?'vergangen':aktiv?'läuft':'geplant'}</span>
    <button style="color:var(--red);padding:8px;font-size:14px;margin-left:4px" data-act="url-del" data-id="${u.id}">${xIco(13)}</button></div>`}).join('')||
   '<div class="empty" style="padding:16px"><b>Keine Einträge</b>Füge Urlaub mit + hinzu.</div>'}</div>`;
 } else {
  body=`<div class="lbl">Stunden nach Mitarbeiter · ${yr}</div>
  <div class="card">${ma.map(m=>{const h=maHrsYr[m.id]||0;const hw=hrs[m.id]||0;
   const ords=S.auftraege.filter(a=>a.mitarbeiterId===m.id&&a.status!=='abgeholt').length;
   return `<div class="lrow" style="cursor:default"><div class="av" style="background:${m.farbe}14;color:${m.farbe};font-weight:800">${esc(m.kuerzel)}</div>

 }
 return shell(seg+body,{title:'Personalwesen',eyebrow:'Team-Übersicht',back:1})+
  `<button class="fab" data-act="pers-new">+</button>`;

/* ============ TERMINKALENDER ============ */
let termWoche=0;
const TTYP={annahme:['Annahme','#0A5FFF'],werkstatt:['Werkstatt','#C2710A'],abholung:['Abholung','#0E8F4E'],besprechung:['Besprechung','#6B4DD6'],lieferung:['Lieferung','#3E3E46'],sonstiges:['Sonstiges','#6B6B73']};
function wkMon(ofs){const d=new Date();d.setDate(d.getDate()-((d.getDay()+6)%7)+ofs*7);
 return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function vTermine(){
 const mon=wkMon(termWoche);
 const days=[];for(let i=0;i<7;i++)days.push(addDays(mon,i));
 const today=todayISO();
 const T=S.termine||[];
 const WDS=['Mo','Di','Mi','Do','Fr','Sa','So'];
 const HOURS=['07','08','09','10','11','12','13','14','15','16','17','18'];
 const byDay={};days.forEach(d=>{byDay[d]=T.filter(t=>t.datum===d)});
 const kw=(()=>{const d=new Date(mon+'T12:00');const o=new Date(d.getFullYear(),0,4);return Math.ceil((((d-o)/86400000)+o.getDay()+1)/7)})();
 const hdr=['<div class="kal-time" style="background:var(--bg);border-right:1px solid var(--line)"></div>',
  ...days.map((d,i)=>{const isTod=d===today;const dd=new Date(d+'T12:00');
   return`<div class="kal-hd-cell${isTod?' today':''}" style="flex:1">${WDS[i]}<br><b style="font-size:12px">${dd.getDate()}.${dd.getMonth()+1}.</b></div>`})].join('');
 const rows=HOURS.map(h=>{
  const cells=days.map(d=>{const isTod=d===today;
   const slot=(byDay[d]||[]).filter(t=>t.von&&t.von.startsWith(h));
   return`<div class="kal-cell${isTod?' today':''}" style="flex:1" data-act="termin-slot" data-datum="${d}" data-h="${h}:00">${slot.map(t=>`<button class="kal-evt" style="background:${(TTYP[t.typ]||TTYP.sonstiges)[1]}" data-act="termin-open" data-id="${t.id}">${esc(t.titel)}<br><span style="font-weight:500;font-size:8px;opacity:.9">${t.von}</span></button>`).join('')}</div>`}).join('');
  return`<div style="display:flex;border-bottom:1px solid var(--line2)"><div class="kal-time">${h}</div>${cells}</div>`;
 }).join('');
 const weekTerms=days.flatMap(d=>byDay[d]||[]);
 const bookUrl=location.origin+location.pathname+'#/buchen';
 const inner=`
  <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
   <button class="icon-btn" data-act="term-woche" data-d="-1" style="flex-shrink:0">‹</button>
   <b style="flex:1;text-align:center;font-size:13px">KW ${kw} · ${new Date(days[0]+'T12:00').getDate()}.${new Date(days[0]+'T12:00').getMonth()+1}. – ${new Date(days[6]+'T12:00').getDate()}.${new Date(days[6]+'T12:00').getMonth()+1}.</b>
   <button class="icon-btn" data-act="term-woche" data-d="1" style="flex-shrink:0">›</button></div>
  ${(()=>{const tod=T.filter(t=>t.datum===today).sort((a,b)=>(a.von||'').localeCompare(b.von||''));
   return tod.length?`<div class="lbl" style="margin-top:0">Heute · ${tod.length} Termin${tod.length!==1?'e':''}</div>
   <div class="card stag" style="margin-bottom:12px">${tod.map(t=>{const k=t.kundeId?kunde(t.kundeId):null;
    const [tl,tc]=(TTYP[t.typ]||TTYP.sonstiges);
    return`<div class="lrow" data-act="termin-open" data-id="${t.id}" style="box-shadow:inset 3px 0 0 ${tc}">
     <div style="flex-shrink:0;text-align:center;min-width:44px"><b class="num" style="font-size:14px;color:${tc}">${t.von||''}</b><div style="font-size:9px;color:var(--ink3)">${t.bis?'bis '+t.bis:''}</div></div>
     <div class="lt"><b>${esc(t.titel)}</b><span>${k?esc(k.name):''}${t.notiz?' · '+esc(t.notiz.slice(0,40)):''}</span></div>
     <span class="tag" style="background:${tc}18;color:${tc}">${tl}</span></div>`}).join('')}</div>`:''})()}
  <div class="card" style="padding:0;overflow:hidden;margin-bottom:12px">
   <div style="overflow-x:auto;-webkit-overflow-scrolling:touch">
    <div style="min-width:420px">
     <div style="display:flex;border-bottom:2px solid var(--line)">${hdr}</div>
     ${rows}
    </div></div></div>
  ${weekTerms.length?`<div class="lbl">Diese Woche · ${weekTerms.length} Termin${weekTerms.length!==1?'e':''}</div>
  <div class="card stag">${weekTerms.map(t=>{const k=t.kundeId?kunde(t.kundeId):null;
   const [tl,tc]=(TTYP[t.typ]||TTYP.sonstiges);
   return`<div class="lrow" data-act="termin-open" data-id="${t.id}">
    <div class="av" style="background:${tc}18;color:${tc}">${IC.plan}</div>
    <div class="lt"><b>${esc(t.titel)}</b><span>${t.datum} ${t.von}–${t.bis}${k?' · '+esc(k.name):''}</span></div>
    <span class="tag" style="background:${tc}18;color:${tc}">${tl}</span></div>`}).join('')}</div>`
  :'<div class="empty"><b>Keine Termine diese Woche</b>Mit + anlegen oder Zelle im Kalender antippen.</div>'}
  <div class="card" style="padding:12px;margin-top:4px">
   <div style="font-size:10.5px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px">Online-Terminbuchungslink</div>
   <div style="display:flex;align-items:center;gap:8px">
    <code style="flex:1;font-size:10px;color:var(--ink2);word-break:break-all;background:var(--bg);border-radius:7px;padding:6px 8px">${esc(bookUrl)}</code>
    <button class="icon-btn" data-act="buchen-link-share" style="flex-shrink:0" title="Link teilen"><span style="width:17px;height:17px;display:block">${IC.share.replace('<svg ','<svg style="stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;width:100%;height:100%" ')}</span></button></div>
   <div style="font-size:10px;color:var(--ink3);margin-top:5px;line-height:1.5">Kunden öffnen diesen Link im Browser — Terminwünsche landen automatisch als Anfragen bei dir.</div>
  </div>`;
 return shell(inner,{title:'Terminkalender',eyebrow:'Wochenplanung',back:1})+`<button class="fab" data-act="termin-new">+</button>`;
}
ACT['term-woche']=el=>{termWoche=(termWoche||0)+parseInt(el.dataset.d||0);render()};

 if(navigator.share){try{await navigator.share({title:S.settings.firma.name+' — Termin buchen',url})}catch(e){}}

function showTerminSheet(t,defDatum,defVon,defBis){
 const isNew=!t;
 const defBisCalc=defVon?String(Math.min(19,parseInt(defVon.split(':')[0])+1)).padStart(2,'0')+':00':null;
 t=t||{titel:'',datum:defDatum||todayISO(),von:defVon||'09:00',bis:defBis||defBisCalc||'10:00',mitarbeiterId:(S.mitarbeiter[0]||{}).id||'',kundeId:'',typ:'annahme',notiz:'',status:'geplant'};
 const maO=S.mitarbeiter.map(m=>`<option value="${m.id}"${t.mitarbeiterId===m.id?' selected':''}>${esc(m.name)}</option>`).join('');
 const kO=S.kunden.map(k=>`<option value="${k.id}"${t.kundeId===k.id?' selected':''}>${esc(k.name)}</option>`).join('');
 const typO=Object.entries(TTYP).map(([v,[l]])=>`<option value="${v}"${t.typ===v?' selected':''}>${l}</option>`).join('');
 sheet(isNew?'Termin anlegen':'Termin bearbeiten',`
  <div class="fld"><label>Bezeichnung *</label><input id="te-titel" value="${esc(t.titel)}" placeholder="z.B. Inspektion Weber"></div>
  <div class="row2"><div class="fld"><label>Datum</label><input type="date" id="te-datum" value="${t.datum}"></div>
   <div class="fld"><label>Typ</label><div class="selwrap"><select id="te-typ">${typO}</select></div></div></div>
  <div class="row2"><div class="fld"><label>Von</label><input type="time" id="te-von" value="${t.von}"></div>
   <div class="fld"><label>Bis</label><input type="time" id="te-bis" value="${t.bis}"></div></div>
  <div class="row2">
   <div class="fld"><label>Mitarbeiter</label><div class="selwrap"><select id="te-mid"><option value="">— alle —</option>${maO}</select></div></div>
   <div class="fld"><label>Kunde</label><div class="selwrap"><select id="te-kid"><option value="">— kein —</option>${kO}</select></div></div></div>
  <div class="fld"><label>Notiz</label><textarea id="te-notiz" rows="2" placeholder="optional">${esc(t.notiz||'')}</textarea></div>
  <div class="row2">${!isNew?`<button class="btn btn-danger" data-act="termin-del" data-id="${t.id}">Löschen</button>`:'<span></span>'}
   <button class="btn btn-main" data-act="termin-save"${!isNew?` data-id="${t.id}"`:''}>${isNew?'Anlegen':'Speichern'}</button></div>`)
}
ACT['termin-save']=el=>{
 const titel=($('#te-titel').value||'').trim();if(!titel)return toast('Bezeichnung fehlt',true);
 const datum=$('#te-datum').value,von=$('#te-von').value,bis=$('#te-bis').value;
 if(!datum)return toast('Datum fehlt',true);
 if(von&&bis&&von>=bis)return toast('Endzeit muss nach Startzeit liegen',true);
 const v={titel,datum,von:von||'09:00',bis:bis||'10:00',typ:$('#te-typ').value,
  mitarbeiterId:$('#te-mid').value,kundeId:$('#te-kid').value,
  notiz:($('#te-notiz').value||'').trim(),status:'geplant'};
 if(el.dataset.id){const t=(S.termine||[]).find(x=>x.id===el.dataset.id);if(t)Object.assign(t,v)}
 else{if(!S.termine)S.termine=[];S.termine.push({id:'te'+uid(),...v})}
 save();closeSheet();render();toast('Termin gespeichert')};
ACT['termin-del']=el=>{S.termine=(S.termine||[]).filter(x=>x.id!==el.dataset.id);save();closeSheet();render();toast('Termin gelöscht')};

 $$('[data-spark]').forEach(el=>{

  const w=100,h=26,mx=Math.max(...vals),mn=Math.min(...vals);

  el.innerHTML='<svg viewBox="0 0 '+w+' '+h+'" preserveAspectRatio="none" style="width:100%;height:26px;display:block">'
   +'<line x1="4" y1="'+y(avg).toFixed(1)+'" x2="'+(w-4)+'" y2="'+y(avg).toFixed(1)+'" stroke="currentColor" stroke-opacity=".22" stroke-width="1"/>'
   +pts.slice(0,-1).map(p=>'<circle cx="'+p[0].toFixed(1)+'" cy="'+p[1].toFixed(1)+'" r="1.8" fill="currentColor" fill-opacity=".6"/>').join('')

/* Swipe-Geste zwischen Reitern — beide Seiten gleichzeitig sichtbar */
(()=>{
 const THRESH=0.3,DUR=260;
 function EDGE(){return Math.round(window.innerWidth*0.22)}
 let gs=null,ov=null;
 function tabs(){return NAVITEMS.map(n=>n[0])}
 function resetApp(){const a=$('#app');if(a){a.style.transition='';a.style.transform=''}}

 document.addEventListener('touchstart',e=>{
  if(e.touches.length>1)return;
  const t=e.touches[0],w=window.innerWidth,edge=EDGE();
  const side=t.clientX<edge?'L':t.clientX>w-edge?'R':null;
  if(!side)return;
  const tab=tabs(),cur=tab.indexOf(route.v);
  if(cur<0)return;
  const ti=side==='L'?cur-1:cur+1;
  if(ti<0||ti>=tab.length)return;
  gs={sx:t.clientX,sy:t.clientY,side,cur,ti,started:false,progress:0};
 },{passive:true});

 document.addEventListener('touchmove',e=>{
  if(!gs)return;
  const t=e.touches[0];
  const dx=t.clientX-gs.sx,dy=Math.abs(t.clientY-gs.sy);
  if(!gs.started){
   if(dy>Math.abs(dx)||Math.abs(dx)<8)return;
   gs.started=true;
   const w=window.innerWidth;
   ov=document.createElement('div');
   ov.style.cssText='position:fixed;inset:0;z-index:50;pointer-events:none;overflow:hidden;background:var(--bg)';
   ov.innerHTML=viewHtml(tabs()[gs.ti]);
   ov.style.transform=`translateX(${gs.side==='L'?-w:w}px)`;
   document.body.appendChild(ov);
  }
  if(!gs.started||!ov)return;
  const w=window.innerWidth;
  const prog=gs.side==='L'
   ?Math.max(0,Math.min(1,(t.clientX-gs.sx)/w))
   :Math.max(0,Math.min(1,(gs.sx-t.clientX)/w));
  const dir=gs.side==='L'?-1:1;
  ov.style.transition='none';
  ov.style.transform=`translateX(${dir*(1-prog)*w}px)`;
  const a=$('#app');if(a){a.style.transition='none';a.style.transform=`translateX(${-dir*prog*w*0.25}px)`}
  gs.progress=prog;
 },{passive:true});

 function finish(){
  if(!gs){return}
  if(!gs.started){gs=null;return}
  const prog=gs.progress||0,w=window.innerWidth;
  const dir=gs.side==='L'?-1:1,tgt=tabs()[gs.ti];
  if(prog>THRESH){
   if(ov){ov.style.transition=`transform ${DUR}ms cubic-bezier(.32,1.3,.5,1)`;ov.style.transform='translateX(0)'}
   const a=$('#app');if(a){a.style.transition=`transform ${DUR}ms cubic-bezier(.32,1.3,.5,1)`;a.style.transform=`translateX(${-dir*w*0.25}px)`}
   const savedOv=ov;gs=null;
   setTimeout(()=>{
    if(savedOv&&savedOv.parentNode)savedOv.parentNode.removeChild(savedOv);
    if(ov===savedOv)ov=null;
    resetApp();skipNextSlide=true;nav(tgt);
   },DUR);
  } else {
   const savedOv=ov;ov=null;
   if(savedOv){
    savedOv.style.transition=`transform 200ms cubic-bezier(.4,0,.2,1)`;
    savedOv.style.transform=`translateX(${dir*w}px)`;
    setTimeout(()=>{if(savedOv.parentNode)savedOv.parentNode.removeChild(savedOv)},210);
   }
   const a=$('#app');if(a){
    a.style.transition='transform 200ms cubic-bezier(.4,0,.2,1)';
    a.style.transform='translateX(0)';
    setTimeout(()=>{a.style.transition='';a.style.transform=''},210);
   }
   gs=null;
  }
 }
 document.addEventListener('touchend',finish,{passive:true});
 document.addEventListener('touchcancel',finish,{passive:true});
})();
